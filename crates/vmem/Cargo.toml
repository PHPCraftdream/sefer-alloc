[package]
name = "aligned-vmem"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
license = "MIT OR Apache-2.0"
description = "Cross-platform aligned anonymous virtual memory: reserve a power-of-two-aligned span (over-reserve + trim), commit/decommit pages, release — mmap/madvise on Unix, VirtualAlloc/MEM_DECOMMIT on Windows. No file-mapping baggage, no extra deps, miri-friendly."
readme = "README.md"
repository = "https://github.com/PHPCraftdream/sefer-alloc"
homepage = "https://github.com/PHPCraftdream/sefer-alloc/tree/main/crates/vmem"
documentation = "https://docs.rs/aligned-vmem"
keywords = ["mmap", "virtualalloc", "memory", "decommit", "aligned"]
categories = ["memory-management", "os", "no-std::no-alloc"]

[dependencies]
