name: perf-gate

# Task #127 — instruction-count CI perf-gate. Guards against the class of
# regression that shipped silently on task #114's const-builder change
# (22-31% wall-clock regression on db_handler-shaped workloads, caught only
# because the user profiled it manually — CI had no signal at all).
#
# Deliberately NOT wired into the default `ci.yml` PR path: perf benchmarks
# (even instruction-count ones) add meaningful job time and are a bad fit for
# "every push/PR" — this is a separate, non-blocking workflow that never
# appears in required-checks for a normal merge.
#
# Trigger surface:
#   - schedule: nightly, so drift is caught within 24h even if no one asks.
#   - workflow_dispatch: on-demand, for "did my in-flight branch regress?"
#     without waiting for the nightly cron.
#   - pull_request (labeled): opt-in per-PR run for perf-sensitive changes —
#     add the `perf` label to a PR to run the gate on it; unlabeled PRs never
#     trigger this workflow at all.
on:
  schedule:
    - cron: '30 3 * * *' # nightly, offset from ci.yml's weekly NUMA cron
  workflow_dispatch:
  pull_request:
    types: [labeled]

env:
  CARGO_TERM_COLOR: always
  # Task #128 — make the gate ENFORCING, not report-only. iai-callgrind reads
  # a regression limit from this env var (equivalently the `--regression` CLI
  # arg): any benchmarked EventKind that regresses beyond the limit vs the
  # compared baseline makes the runner exit non-zero, failing the job. `Ir`
  # (instructions retired) is the deterministic metric this gate is built on;
  # 10% is the tight-but-not-flaky threshold the bench doc argues for (a
  # wall-clock band would have to be ±15-20% and would have missed #114's
  # 22-31%). NOTE: this only trips once a baseline exists to compare against
  # (see the save/compare split below) — the first main-branch run merely
  # records the baseline. The exact numbers, and that the limit actually
  # fires, are confirmed on the first real Linux CI run (Valgrind is
  # Linux-only, so this cannot be validated on a dev machine).
  IAI_CALLGRIND_REGRESSION: 'Ir=10'

# SEC-4 (task #201): least-privilege token scope. The job checks out the repo,
# caches/uploads artifacts, and runs `cargo bench`; none of these require
# contents-write on the repo (no `git push`, no release, no PR comment).
# `actions/upload-artifact` and `actions/cache` use their own scoped backends,
# not the contents API.
permissions:
  contents: read

jobs:
  iai-callgrind:
    name: instruction-count regression gate
    runs-on: ubuntu-latest
    # Only actually run the label-triggered event when the 'perf' label is
    # the one that was just added — `types: [labeled]` fires for ANY label
    # add, so without this guard every unrelated label would also trigger a
    # full Valgrind run. schedule/workflow_dispatch are unaffected (this
    # condition only matters for the `pull_request` event).
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'perf'
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Valgrind
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y valgrind

      - name: Install iai-callgrind-runner
        # The runner binary's version MUST match the `iai-callgrind` library
        # version pinned in Cargo.toml (0.14 — a caret requirement, "^0.14",
        # per Cargo's default). `--version 0.14` risks being parsed by cargo
        # as an exact-version pin (there is no crates.io release literally
        # named "0.14", only "0.14.x" patches), so the install could fail;
        # use the same explicit caret syntax as Cargo.toml so both pins are
        # consistent and unambiguous.
        run: cargo install iai-callgrind-runner --version "^0.14" --locked

      # Task #128 — persist the `main` baseline across runs so PRs can be
      # compared against it. GitHub Actions lets a PR restore a cache saved on
      # its base branch (main), so a baseline recorded by the nightly/main run
      # below is visible to labelled PR runs. `restore-keys` picks the most
      # recent `iai-baseline-main-*` entry when there is no exact-SHA hit.
      - name: Restore the main iai baseline
        uses: actions/cache/restore@v4
        with:
          path: target/iai
          key: iai-baseline-main-${{ github.sha }}
          restore-keys: |
            iai-baseline-main-

      - name: Run perf-gate benchmarks (instruction counts)
        # `--features production` (alloc-global + alloc-xthread +
        # alloc-decommit + fastbin) — NOT just `alloc-global`. The whole
        # point of this gate is to catch regressions in the optimizations
        # task #127 was built to guard (C1's magazine/fastbin fast path, D1's
        # large-segment cache under alloc-decommit); benching with only
        # `alloc-global` would let a magazine/large-cache regression sail
        # through silently. `production` is the crate's real-world default.
        #
        # Task #128 (enforcing): a PR run COMPARES against the restored `main`
        # baseline (`--baseline=main`); combined with the
        # `IAI_CALLGRIND_REGRESSION` env above, a >10% `Ir` regression exits
        # non-zero and FAILS the job. A main-branch / scheduled / dispatched
        # run instead (re)RECORDS the baseline (`--save-baseline=main`), which
        # the cache-save step below persists. The very first main run has no
        # baseline to regress against — it only records one.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cargo bench --bench perf_gate_iai --features production -- --baseline=main
          else
            cargo bench --bench perf_gate_iai --features production -- --save-baseline=main
          fi

      # Persist the freshly-recorded `main` baseline (main / scheduled /
      # dispatched runs only — a PR must never overwrite the baseline it is
      # judged against). A new key per SHA is required because GitHub cache
      # entries are immutable; `restore-keys` above finds the newest.
      - name: Save the main iai baseline
        if: github.event_name != 'pull_request'
        uses: actions/cache/save@v4
        with:
          path: target/iai
          key: iai-baseline-main-${{ github.sha }}

      - name: Upload Callgrind artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-gate-callgrind-${{ github.run_id }}
          path: target/iai/
          retention-days: 30
