name: CI

# Phase 5 hardening + publish-prep gate. Runs the full verification matrix the
# PLAN calls for: fmt, clippy (pedantic), the test suite across feature sets,
# miri on the invariant + byte tests, a no_std build, and a multi-arch matrix
# (x86_64 + aarch64) for weak-memory coverage. The cargo-fuzz and the
# multi-arch cross runs are documented intent here; cargo-fuzz has its own
# scheduled/nightly cadence (see fuzz/README.md) because it is CPU-hour heavy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # NUMA real-kernel job (weekly Monday 06:00 UTC)
  workflow_dispatch:

# SEC-4 (task #201): least-privilege token scope. No job in this workflow
# performs any write to the repo contents (no `git push`, no release creation,
# no PR/issue comment) — every job is a read-only check (checkout + cargo).
# Pin the workflow-level GITHUB_TOKEN to read-only contents so the job default
# cannot widen it even if the repo default token were read/write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # `-D warnings` is the strict-CI policy (Phase F3, task #124). Re-enabled
  # after a dedicated warnings-cleanup pass: the 6 pre-existing lib findings
  # (needless_range_loop in `refill_class`, manual_is_multiple_of in
  # `class_for`, 4x doc_lazy_continuation in the `tcache` doc comment) plus
  # a handful of test-file / sibling-crate findings (manual_is_multiple_of
  # in `crates/numa`, manual_dangling_ptr in `tests/numa_seam.rs`,
  # zero_repeat_side_effects / assertions_on_constants in two other test
  # files, annotated `#[allow]` with rationale where the lint's suggested
  # fix would have changed test semantics) were fixed or explicitly
  # annotated. Verified clean under `cargo clippy --all-targets <features>
  # -- -D warnings` for every feature combination in the `clippy` and
  # `test` matrices below at the time this was re-enabled.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    # Consolidated (2026-07-12, CI job-count reduction) from 3 matrix jobs
    # into 3 sequential steps in one job. Each matrix entry paid its own
    # checkout + toolchain install for a lint pass that runs in well under a
    # minute — fixed per-job overhead was tripled for no parallelism benefit
    # clippy needs. This does not reduce total CI work, only how many
    # CONCURRENT jobs it costs against the account's job-concurrency ceiling
    # (see the `loom`/`miri`/`miri-plain` jobs below, consolidated the same
    # way, for the jobs that actually moved the needle).
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Default clippy lints — correctness gate. Pedantic was an aspirational
      # policy that produces noise out of proportion to value as a blocking
      # CI gate; keep it as an opt-in `cargo clippy -- -W clippy::pedantic`
      # for periodic cleanup, not as a per-PR blocker.
      - name: clippy ()
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (--features experimental)
        run: cargo clippy --all-targets --features experimental -- -D warnings
      - name: clippy (--all-features)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Consolidated (2026-07-12, CI job-count reduction) from 13 single-
  # feature-set matrix jobs into 4 jobs, grouped by theme (the same
  # grouping the original per-entry comments already used). Unlike
  # `loom`/`miri` above, these 13 entries have 13 DIFFERENT feature
  # strings (no pair shares one, so there is no "share one cargo
  # invocation" trick available) — each step below is its own `cargo
  # test <features> --no-fail-fast` invocation, same as before.
  #
  # Every step carries `if: ${{ !cancelled() }}` so a failure in one
  # feature-set's step does NOT skip the remaining steps in the same job
  # (GitHub Actions' default is to skip subsequent steps after a
  # failure) — this preserves, at the feature-set granularity, the exact
  # property `--no-fail-fast` already guarantees at the test-binary
  # granularity within one step: "a failure in one row never masks
  # failures in later rows" (the explicit 0.3.0-hardening-pass lesson
  # this repo learned the hard way once already). The job's own overall
  # conclusion still correctly reports failure if any step failed.
  test-core:
    name: test (core tiers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: test ()
        if: ${{ !cancelled() }}
        run: cargo test --no-fail-fast # default: the safe core + SyncRegion
      - name: test (--features experimental)
        if: ${{ !cancelled() }}
        run: cargo test --features experimental --no-fail-fast # adds LockFreeRegion + EpochRegion (deprecated, legacy)
      # Phases 8–13 allocator descent. Without this, CI never exercised
      # alloc-core (the segment substrate, AllocCore).
      - name: test (--features alloc-core)
        if: ${{ !cancelled() }}
        run: cargo test --features alloc-core --no-fail-fast

  test-xthread:
    name: test (xthread progression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # Phases 9–11: per-thread Heap + SeferAlloc + cross-thread free.
      - name: test (--features "alloc-global alloc-xthread")
        if: ${{ !cancelled() }}
        run: cargo test --features "alloc-global alloc-xthread" --no-fail-fast
      # + Phase 35 M6 decommit.
      - name: test (--features "alloc-global alloc-xthread alloc-decommit")
        if: ${{ !cancelled() }}
        run: cargo test --features "alloc-global alloc-xthread alloc-decommit" --no-fail-fast
      # #137: the fastbin (magazine/tcache) path and the flagship
      # `production` bundle were NOT exercised in CI — the entire
      # magazine code path (the churn hot path) ran untested. Cover both:
      # `fastbin` in isolation (magazine without decommit) and the full
      # `production` bundle (fastbin + decommit + everything).
      - name: test (--features "alloc-global alloc-xthread fastbin")
        if: ${{ !cancelled() }}
        run: cargo test --features "alloc-global alloc-xthread fastbin" --no-fail-fast
      - name: test (--features production)
        if: ${{ !cancelled() }}
        run: cargo test --features production --no-fail-fast # #137: the recommended flagship config (fastbin + decommit)

  test-hardened:
    name: test (hardened tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # H1 (#167): the opt-in `hardened` misuse-guard tier. Without this
      # step the interior-pointer guard and its counterfactual regression
      # test (`regression_hardened_interior_ptr`, gated on the feature)
      # would never RUN in CI — clippy's --all-features only compiles
      # it. Also covers the fastbin-without-decommit config with the
      # guard on.
      - name: test (--features hardened)
        if: ${{ !cancelled() }}
        run: cargo test --features hardened --no-fail-fast
      # H1 follow-up: README calls `hardened` "additive over
      # production", but no CI row built the two together — the
      # paranoid guard tier was only ever exercised WITHOUT decommit
      # (the step above is fastbin-without-decommit). This step is the
      # flagship+paranoid combo so the misuse-guard runs alongside the
      # decommit (M6) recommit cycle.
      - name: test (--features "production hardened")
        if: ${{ !cancelled() }}
        run: cargo test --features "production hardened" --no-fail-fast

  test-gated-bodies:
    # C2 (bug-hunt review 2026-07-09): the steps below ship tests whose
    # BODIES are gated behind `#[cfg(feature = "...")]`, so NO plain
    # `cargo test` run exercises their behavior — the preprocessor strips
    # the test bodies out entirely otherwise. They were only ever exercised
    # locally via `npm run check` (scripts/check-all.mjs), a pre-push gate,
    # not per-PR CI. These steps run the gated test bodies per-PR:
    #   - alloc-stats: the per-hit counter asserts (stats_reflects_activity)
    #   - pinning: the routing-binding tests in tests/pinning.rs
    # The feature-strings mirror scripts/check-all.mjs verbatim.
    name: test (gated bodies + all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: test (--features "production alloc-stats")
        if: ${{ !cancelled() }}
        run: cargo test --features "production alloc-stats" --no-fail-fast
      - name: test (--features pinning)
        if: ${{ !cancelled() }}
        run: cargo test --features pinning --no-fail-fast
      # `--all-features` as the closing step: exercises every gated tier
      # together (adds experimental + hardened + numa-aware on top). The
      # numa_alloc real-mbind assertions are env-guarded
      # (SEFER_NUMA_TEST=1, set ONLY by the scheduled `numa-real-kernel`
      # job) and skip trivially on this single-NUMA runner, so
      # `--all-features` here is a compile+link+run check of the full
      # feature union, not a NUMA correctness gate. Verified green
      # locally under the same conditions.
      - name: test (--all-features)
        if: ${{ !cancelled() }}
        run: cargo test --all-features --no-fail-fast

  test-windows:
    # Windows is the primary dev OS, yet only the numa-shim real-syscall path
    # ran on a Windows kernel in CI — the ALLOCATOR itself (the aligned-vmem
    # VirtualAlloc / MEM_DECOMMIT reserve/commit/decommit path) was only ever
    # tested locally. Run the flagship `production` bundle on real Windows so a
    # regression in the Windows vmem backend is caught per-PR. Kept minimal:
    # checkout, stable toolchain, the two test runs.
    name: test windows (production)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --features production --no-fail-fast
      # The magazine-in-isolation config (fastbin without decommit) exercises the
      # commit-only Windows vmem path (no MEM_DECOMMIT), complementing the
      # production run above.
      - run: cargo test --features "alloc-global alloc-xthread fastbin" --no-fail-fast

  test-macos:
    # macOS runners are real Darwin, so the aligned-vmem `madvise(MADV_DONTNEED)`
    # decommit path (and the BSD `MAP_ANON = 0x1000` mmap constant) actually run
    # here — neither the Linux nor the Windows jobs exercise the XNU vmem
    # backend. Run the flagship `production` bundle plus the decommit-touching
    # soak / stale-ring tests explicitly so a regression in the Darwin
    # decommit/recommit path is caught per-PR. Kept minimal, matching
    # `test-windows`: checkout, stable toolchain, the test runs.
    name: test macos (production)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --features production --no-fail-fast
      # The decommit path in isolation: MADV_DONTNEED on Darwin is advisory/lazy
      # (no zero-fill guarantee); these tests assert correctness holds regardless.
      - run: cargo test --features "alloc-global alloc-xthread alloc-decommit" --test decommit_soak --test decommit_stale_ring --no-fail-fast

  test-workspace:
    # `cargo test` at the repo root tests ONLY the root package; the workspace
    # member crates' own test suites (aligned-vmem — the most unsafe-critical
    # crate — plus sefer-region and malloc-bench-rs) never ran in CI. Run each
    # member's tests explicitly. Default features only: the feature flags are
    # root-crate-scoped, so `--workspace` with `--features` would not apply
    # cleanly to the members; the root feature matrix is covered by the `test`
    # job above.
    name: test workspace members
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p aligned-vmem -p sefer-region -p malloc-bench-rs --no-fail-fast

  msrv:
    # MSRV gate: `rust-version = "1.88"` is declared but never enforced, so an
    # accidental use of a stdlib API / language feature stabilised after 1.88
    # would slip through (stable CI runs a much newer toolchain). A build-only
    # `cargo check --all-features` on the pinned 1.88 toolchain is sufficient
    # evidence that the crate still compiles on its declared minimum.
    name: MSRV 1.88 (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
      - run: cargo check --all-features

  no_std:
    # The single-threaded core (Region<T> / Handle<T>) builds under no_std +
    # alloc. A build check is sufficient evidence; there is no std in the core
    # to link against, so `cargo build --no-default-features` failing would
    # surface any accidental std dependency.
    name: no_std core build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      # A bare-metal target with no std, so a successful compile proves the core
      # truly is no_std + alloc (not just "host build without the std feature").
      - run: cargo build --no-default-features --target thumbv7em-none-eabi

  # Consolidated (2026-07-12, CI job-count reduction) from 9 single-test
  # matrix jobs into 3 jobs, grouped by feature string (tests sharing a
  # feature string share ONE `cargo miri test` invocation with multiple
  # `--test` flags — one compile instead of N — rather than merely sharing a
  # job with N separate invocations). Each job below still pays only one
  # checkout + nightly+miri toolchain install. Per-test rationale comments
  # from the original single-job-per-test layout are preserved next to each
  # `--test` entry.
  #
  # BUG FIX folded in here: the `region_invariants` entry below used to run
  # as the bare positional filter `cargo miri test region_invariants` — a
  # SUBSTRING filter over TEST FUNCTION NAMES, not a target selector. None of
  # `region_invariants.rs`'s actual test functions
  # (`insert_get_remove_keeps_others_valid`, `stale_handle_after_reuse_is_none`,
  # `get_mut_mutates_in_place`, `drops_each_value_exactly_once`,
  # `clear_invalidates_all_handles`) contain the substring "region_invariants",
  # so that invocation silently matched and ran ZERO tests (verified: `cargo
  # test region_invariants` reports "0 passed" across every one of the
  # workspace's ~137 test binaries) while still reporting a green `pass` —
  # this CI job has been checking nothing since it was added. Fixed by using
  # `--test region_invariants` (selects the BINARY; all 5 tests inside it run)
  # like every other entry in this matrix already did correctly.
  miri-core:
    name: miri (core)
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      # The core invariants (UB-free slotmap membrane), default features.
      - name: region_invariants
        run: cargo miri test --test region_invariants
      # Phase 8 core invariants under miri: the M6 decommit/recommit cycle
      # (zero-crossing of payload pages) over the segment substrate.
      - name: decommit_miri_cycle
        run: cargo miri test --features "alloc-core alloc-decommit" --test decommit_miri_cycle
      # Phase 9–11 reclaim-offset arithmetic (cross-thread free placement)
      # under miri's strict provenance — UB-free pointer math in the
      # ring/reclaim path.
      - name: reclaim_offset_unit
        run: cargo miri test --features "alloc-global alloc-xthread" --test reclaim_offset_unit

  miri-alloc-core:
    # Phase F5 (task #124) align-regression tests + S3 (#168) boundary sweep,
    # all `alloc-core`-only (no unsafe in the test bodies themselves —
    # verified locally under this exact MIRIFLAGS before originally adding
    # each: ~99s/267s/3s for the three align tests, ~40s for the sweep under
    # its `cfg(miri)`-shrunk grid). Same feature string across all four, so
    # one `cargo miri test` invocation with four `--test` flags shares a
    # single compile.
    name: miri (alloc-core)
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      # NOTE: `regression_own_segment_cache_invalidation` (the Э3 own-segment
      # cache invalidation) was evaluated for miri and DEFERRED (R3, #155):
      # its correctness assertion needs ROUND_BLOCKS=18_000 across
      # TARGET_SEGMENTS=6 (~100k interpreted 256 B allocations), which did
      # not even finish compiling+running under miri in ~9 min locally — it
      # would time out CI. The block-count is invariant-load-bearing (it
      # must span >= 6 real 4 MiB segments), so it cannot be
      # `cfg(miri)`-capped without voiding the test. Its decommit/recommit
      # UB surface is already covered by `decommit_miri_cycle` above.
      - run: >-
          cargo miri test --features alloc-core
          --test regression_large_align_no_segment_exhaustion
          --test regression_page_aligned_no_segment_exhaustion
          --test regression_realloc_cross_class_shrink
          --test stress_boundary_sweep

  miri-fastbin:
    # R3 (#155): the fastbin M2 oracle path had ZERO miri coverage — the Э6
    # "free path never touches the block body" strict-provenance claim was
    # never checked under miri. Plus the bump-direct carve path's pointer
    # math under strict provenance (Э1; the cold-storm size is capped under
    # `cfg(miri)` inside the test so the run fits miri's runtime — the
    # decommit-heavy `d1_cold_storm_then_free_decommits` case stays
    # `cfg(not(miri))`, its N is size-load-bearing and cannot be capped).
    # Both single-threaded, both the production feature set (fastbin +
    # decommit) — one invocation, two `--test` flags.
    name: miri (fastbin)
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: >-
          cargo miri test --features "alloc-global alloc-xthread alloc-decommit fastbin"
          --test regression_magazine_oracles
          --test regression_bump_direct_refill

  miri-plain:
    # W6: PLAIN-provenance miri for the exposed-provenance intrusive stacks.
    # `src/registry/bootstrap.rs` (~lines 126-136) documents that the A1
    # `deferred_large` push/drain stack and the `abandoned_segs` stack pack a
    # real pointer's address via `expose_provenance` and re-derive it via
    # `with_exposed_provenance_mut` BY DESIGN. That wildcard-provenance shape is
    # rejected by `-Zmiri-strict-provenance` (correctly — the documented
    # structural limit, not a bug), so the strict `miri` job above gives the
    # `push.rs` / `drain.rs` / `heap_registry.rs` / `node.rs` pairs ZERO
    # coverage. This job runs the tests that exercise those stacks under PLAIN
    # miri (Stacked Borrows, miri's default non-strict provenance model) — the
    # ONLY mode in which the re-derivations validate. It DROPS
    # `-Zmiri-strict-provenance` and keeps only `-Zmiri-disable-isolation`.
    # Kept SEPARATE from the strict `miri` job (whose tests stay strict-clean);
    # no test is shared between the two jobs. Small N per test (Large allocs,
    # <=100 iterations) keeps each run miri-affordable.
    # Consolidated (2026-07-12, CI job-count reduction) from 2 matrix jobs
    # into 1 job. Both entries share the SAME features AND the SAME
    # MIRIFLAGS (below), so they run as one `cargo miri test` invocation with
    # two `--test` flags — one compile, one job, instead of two of each.
    name: miri-plain
    runs-on: ubuntu-latest
    env:
      # Elevated preemption rate: the task H1 aliasing guard
      # (`regression_xthread_thread_free_alias_miri`) needs the scheduler to
      # interleave a remote cross-thread-free CAS INSIDE a live owner
      # `alloc(&mut self)` frame. The other plain test is phase-serialised and
      # indifferent to the rate.
      MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-preemption-rate=0.5"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      # The A1 deferred-large / abandoned-seg exposed-provenance stacks over
      # the GLOBAL-singleton `SeferAlloc`/`HeapCore` face. The three test fns
      # (double-free-no-double-reclaim, counter-advances-again, reclaims-
      # segments-no-leak) drive the `push.rs` / `drain.rs` / `heap_registry.rs`
      # / `node.rs` re-derivations; under plain miri they show up as
      # integer-to-pointer cast WARNINGS (validated, not errors — strict miri
      # would hard-ERROR on exactly those casts, which is why this must run
      # non-strict). Verified locally: 3 passed, 0 failed (~156s).
      #
      # NOT included — the two explicit-`Heap`-face tests
      # (`regression_heap_xthread_large_free_no_leak`,
      # `regression_xthread_large_free_layout_mismatch`): both call
      # `Heap::new()` on a SPAWNED thread, whose per-thread primordial 4 MiB
      # segment becomes unreachable when that thread exits, so miri's leak
      # checker reports it (a genuine miri artifact of the per-thread `Heap`
      # face, NOT the exposed-provenance path — the p2i re-derivations warn
      # cleanly there too). Silencing it needs `-Zmiri-ignore-leaks`, which
      # would defeat these "no_leak" oracles. Their cross-thread reclaim IS
      # covered on REAL threads by the TSan `tsan` job instead.
      #
      # The second test (H1 aliasing guard) needs the elevated preemption
      # rate set in this job's `env` above; both share it (harmless for the
      # first test, which is phase-serialised and indifferent to the rate).
      - run: >-
          cargo miri test --features "alloc-global alloc-xthread"
          --test regression_xthread_large_free_no_leak
          --test regression_xthread_thread_free_alias_miri

  # Loom model-checking of every concurrency protocol in the crate: the
  # bootstrap-CAS state-machine (Registry lazy init), the adopt protocol
  # (HeapRegistry.owner_state), cross-thread protocol (xthread / remote_ring
  # / thread_free), and the deprecated experimental tier (sharded / epoch).
  # Every protocol's loom file ships with a `should_panic` counterfactual
  # that proves the harness is non-vacuous.
  #
  # Loom does NOT compose with the real allocator (it replaces atomics +
  # threads + the global allocator), so these tests model each protocol's
  # atomics in isolation against loom's harness — they are NOT integration
  # tests that run the production code paths.
  #
  # Consolidated (2026-07-12, CI job-count reduction) from 11 single-test
  # matrix jobs into 4 jobs, grouped by feature string exactly like the
  # `miri`/`miri-plain` jobs above: same-feature tests share one `cargo
  # test --test A --test B ...` invocation (one compile); the one job below
  # with two genuinely different feature strings runs them as two
  # sequential steps instead.
  loom-alloc-global:
    name: loom (alloc-global)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "--cfg loom"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # CRATE-P3: the four in-tree shadow-model harnesses
      # (loom_bootstrap_cas, loom_chunk_cas, loom_overflow_sidecar_cas,
      # loom_fallback_init) that each transcribed the `UNINIT -> INITIALIZING
      # -> READY` CAS-publish/OOM-rollback protocol were collapsed into ONE
      # suite that model-checks the REAL `racy_ptr_cell::RacyPtrCell` type (the
      # extracted crate aliases its atomics to `loom` under `--cfg loom`). It
      # runs against the crate directly (`-p racy-ptr-cell`, no sefer
      # features) — see the `loom_racy_ptr_cell` step below.
      # CRATE-P7: real-type `TaggedIndexStack` loom suite (replaces the in-tree
      # `loom_free_slots_aba` shadow model). The Registry `free_slots` Treiber
      # stack + `TaggedPtr` ABA-tag model was extracted to the
      # `tagged-index-stack` crate (`heap_registry.rs` pop_free_slot/
      # push_free_slot now consume `TaggedIndexStack<16>`); the crate aliases its
      # atomics to `loom` under `--cfg loom` so this suite model-checks the REAL
      # shipping type, with the untagged-corruption and H-2 empty-transition
      # tag-reset `#[should_panic]` counterfactuals proving non-vacuousness. Runs
      # against the crate directly (`-p tagged-index-stack`, no sefer features).
      - run: >-
          cargo test --release -p tagged-index-stack
          --test loom_aba
      # CRATE-P3: real-type `RacyPtrCell` loom suite (replaces the 4 shadow
      # models above). Includes the Relaxed-publish and spin-on-READY-livelock
      # `#[should_panic]` counterfactuals proving the harness is non-vacuous.
      - run: >-
          cargo test --release -p racy-ptr-cell
          --test loom_racy_ptr_cell
      # CRATE-P4: real-type `MpscRing` / `DirtyRouter` loom suite. Collapses the
      # SEVEN in-tree ring/dirty shadow models (loom_remote_ring,
      # loom_remote_ring_drain_guard, loom_heap_overflow,
      # loom_heap_overflow_drain_guard, loom_overflow_first_retry,
      # loom_dirty_publish, loom_dirty_multi_segment) into one suite against the
      # REAL `ring-mpsc` types (the crate aliases its atomics to `loom` under
      # `--cfg loom`). Ships the drain-without-break / drain-without-clear /
      # wrong-pair-publish-order / R2-4-return-tail `#[should_panic]`
      # counterfactuals proving the harness is non-vacuous.
      - run: >-
          cargo test --release -p ring-mpsc
          --test loom_ring_mpsc

  loom-xthread:
    name: loom (alloc-core alloc-xthread)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "--cfg loom"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # #141: loom_deferred_large — A1 deferred_large push/drain Treiber-stack
      # model (the double-push guard + DEFERRED_LARGE_TAIL/ABANDONED_TAIL
      # sentinel split from `src/alloc_core/deferred_large/push.rs`/`drain.rs`).
      - run: >-
          cargo test --release --features "alloc-core alloc-xthread"
          --test loom_xthread_protocol
          --test loom_remote_ring
          --test loom_deferred_large

  loom-experimental:
    name: loom (experimental)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "--cfg loom"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: >-
          cargo test --release --features "experimental"
          --test loom_sharded
          --test loom_epoch

  loom-misc:
    # The two remaining models don't share a feature string with each other
    # or with any of the three groups above, so they run as two sequential
    # steps (still one job, one checkout/toolchain) rather than each
    # justifying its own job.
    name: loom (misc)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "--cfg loom"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # task #204: the `alloc` Cargo feature (and the `Heap` type it gated)
      # was removed; this file's synthetic `Node` model never actually
      # depended on it (verified: compiles and passes with an empty feature
      # set) — the CI matrix simply hadn't been updated when the feature was
      # deleted.
      - name: loom_thread_free
        run: cargo test --release --test loom_thread_free
      # R2 (#154): magazine↔RemoteFreeRing composition shadow model. The
      # primary test is a `#[should_panic]` counterfactual PINNING the #164
      # residual hole — it stays green exactly while the hole exists, and
      # goes red the moment a fix (or a regression) changes the composition,
      # forcing the model to be updated alongside #164.
      - name: loom_magazine_ring_compose
        run: cargo test --release --features "alloc-global alloc-xthread" --test loom_magazine_ring_compose

  tsan:
    # ThreadSanitizer (weak-memory / data-race detector) gate for the
    # cross-thread allocator path. TSan catches missing-synchronization /
    # data-race bugs in the ring/reclaim/owner-stamp protocol (Phases 9–11)
    # that pure functional tests on x86_64 can hide. Requires nightly +
    # rust-src (for `-Zbuild-std`, since TSan must instrument the std/core it
    # links against). Linux-only; not runnable on the Windows dev host.
    name: thread-sanitizer
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Zsanitizer=thread"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      # The race-prone cross-thread tests: the reproduction harnesses
      # (race_repro / race_norecycle) and the multi-threaded global-alloc
      # churn (global_alloc_mt). `-Zbuild-std` rebuilds std with TSan
      # instrumentation so the detector sees inside the standard library too.
      # (task #204: `heap_cross_thread` was removed along with the `Heap`
      # type it exercised — its cross-thread coverage lives on via
      # `HeapCore`'s own MT tests below, e.g.
      # `regression_realloc_xthread_stamp`.)
      - name: Run race-prone tests under ThreadSanitizer
        run: >-
          cargo +nightly test
          -Zbuild-std
          --target x86_64-unknown-linux-gnu
          --features "alloc-global alloc-xthread"
          --test race_repro
          --test race_norecycle
          --test global_alloc_mt
      # R3 (#155): the `alloc-global alloc-xthread` step above leaves the whole
      # magazine / fastbin production layer UNINSTRUMENTED by TSan. Add a second
      # step over the flagship `production` feature set (fastbin + decommit) on
      # the multi-threaded tests. This is the run that actually exercises the
      # Э5 non-atomic per-heap counters (heap_core.rs `tcache_hits`,
      # alloc_core.rs `large_cache_hits` — a split load+store the single-writer
      # claim must justify) AND the `stats()` aggregation that reads REMOTE
      # heaps' counters (the initialised-gate, #133) — the classic TSan target.
      # `tls_heap_teardown_ordering_stress` and
      # `regression_percounter_perheap_aggregation` are the MT tests that drive
      # the teardown/recycle handshake and the cross-heap counter read. Verified
      # locally via WSL: 0 data races reported.
      #
      # S3 (#168): the concurrent boundary-stress hammer (S1,
      # `stress_concurrent_boundaries`) is added to THIS production step — the
      # magazine / RemoteFreeRing / Э5-counter race surface under boundary
      # pressure is the highest-value TSan combination. Its per-thread op budget
      # and thread cap are slashed for the sanitizer via the env below
      # (`SEFER_STRESS_OPS` overrides the absolute budget; `SEFER_STRESS_MAX_THREADS`
      # caps the workers at 4 to bound TSan's shadow memory) so the run stays
      # ~sub-second. These env vars are read ONLY by that test and are UNSET in
      # the native suite, so native behavior is byte-identical to before.
      #
      # W6: the Large cross-thread FREE path (the A1 deferred-large /
      # abandoned-seg exposed-provenance stacks) was UNINSTRUMENTED — every test
      # above frees small blocks cross-thread. `regression_realloc_xthread_stamp`
      # (the W4/MUST-1 realloc → cross-thread-free path) is a genuine MT test
      # (spawns a non-owner thread that remotely frees a Large segment) and
      # compiles under `production`, so it's added to this step. (task #204:
      # `regression_heap_xthread_large_free_no_leak`, which covered the same
      # A1 Large cross-thread reclaim over the removed `Heap` face, was
      # deleted along with `Heap` — `HeapCore` has no public
      # `dealloc_any_thread` to give it a faithful substitute; the
      # `regression_realloc_xthread_stamp` coverage above remains.)
      - name: Run production-config tests under ThreadSanitizer
        env:
          SEFER_STRESS_OPS: "600"
          SEFER_STRESS_MAX_THREADS: "4"
        run: >-
          cargo +nightly test
          -Zbuild-std
          --target x86_64-unknown-linux-gnu
          --features "production"
          --test global_alloc_mt
          --test tls_heap_teardown_ordering_stress
          --test regression_percounter_perheap_aggregation
          --test regression_realloc_xthread_stamp
          --test stress_concurrent_boundaries

  multi-arch:
    # x86 is a strong-memory model; aarch64 is weak-memory and can surface
    # ordering bugs the x86 run hides. We cross-compile and run via `cross` for
    # aarch64. (The concurrent tiers carry the ordering-sensitive `unsafe`.)
    name: test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Run tests (native)
        if: ${{ !matrix.use_cross }}
        run: cargo test --target ${{ matrix.target }} --features experimental
      # Weak-memory coverage for the allocator's cross-thread ordering: the
      # ring/reclaim/owner-stamp (Phases 9–11) and the M6 decommit/recommit
      # zero-crossing (Phase 35). aarch64 is the load-bearing run here (weak
      # memory model can expose ordering bugs x86_64 hides); x86_64 is the
      # strong-memory baseline.
      - name: Run cross-thread tests (native)
        if: ${{ !matrix.use_cross }}
        run: cargo test --target ${{ matrix.target }} --features "alloc-global alloc-xthread"
      - name: Run cross-thread + decommit tests (native)
        if: ${{ !matrix.use_cross }}
        run: cargo test --target ${{ matrix.target }} --features "alloc-global alloc-xthread alloc-decommit"
      - name: Run tests (cross)
        if: ${{ matrix.use_cross }}
        run: cross test --target ${{ matrix.target }} --features experimental
      - name: Run cross-thread tests (cross)
        if: ${{ matrix.use_cross }}
        run: cross test --target ${{ matrix.target }} --features "alloc-global alloc-xthread"
      - name: Run cross-thread + decommit tests (cross)
        if: ${{ matrix.use_cross }}
        run: cross test --target ${{ matrix.target }} --features "alloc-global alloc-xthread alloc-decommit"
      # Weak-memory coverage for the newest 0.3.0 magazine layer: the Э5 relaxed
      # load/store per-heap counters and the P7 batching path (the `fastbin` /
      # `production` bundle) were NEVER run on aarch64 — only the pre-magazine
      # tiers above crossed onto weak memory. aarch64's weak model is exactly
      # where a mis-ordered relaxed counter or batch drain would surface.
      - name: Run production tests (cross)
        if: ${{ matrix.use_cross }}
        run: cross test --target ${{ matrix.target }} --features production

  numa-shim-mock:
    # NUMA Phase 1: verify wrapping logic on every CI run without real
    # multi-NUMA hardware.  Runs on Linux; the mock is platform-agnostic
    # but Linux is the cheapest runner and covers the most-used NUMA path.
    name: numa-shim mock dispatch tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p numa-shim --features mock
      - run: cargo test -p numa-shim --features "mock vmem-integration"

  numa-shim-windows:
    # Run the numa-shim real-syscall path on a real Windows kernel.
    # `windows-latest` is single-NUMA (node=0), but that exercises the
    # FULL VirtualAllocExNuma + Reservation::from_raw_parts code path:
    # if alignment math, over-reserve sizing, or release_len is wrong,
    # the smoke test fault-ins, drops, or 8x repeat loop will SEGV / leak
    # / abort on ANY node — multi-node topology is not needed to catch
    # memory-safety bugs.  This closes the per-PR coverage gap for the
    # Windows VirtualAllocExNuma path (task #83).
    name: numa-shim real Windows kernel (correctness, not perf)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p numa-shim
      - run: cargo test -p numa-shim --features vmem-integration
      - run: cargo test -p numa-shim --features mock
      - run: cargo test -p numa-shim --features "mock vmem-integration"

  numa-shim-macos:
    # macOS NUMA support is a documented no-op (no public NUMA API), but
    # we still exercise the smoke tests + mock dispatch to ensure the
    # cross-platform compile + the API contract (None / NO_NODE returns)
    # don't regress.  Lightweight per-PR coverage.
    name: numa-shim real macOS kernel (no-op contract)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p numa-shim
      - run: cargo test -p numa-shim --features vmem-integration
      - run: cargo test -p numa-shim --features mock

  numa-real-kernel:
    # NUMA Phase 2: validate the real-kernel Linux integration path on every
    # scheduled run (weekly) and on-demand (workflow_dispatch).  The GitHub
    # Actions runner is single-NUMA, so the env-guarded tests in numa_alloc.rs
    # (SEFER_NUMA_TEST=1) run through their full code path — including mbind(2)
    # and sysfs reads — but on a kernel that only has one node.  That is still
    # far more coverage than Phase 1's pure-Rust mock: we prove that the
    # production feature combo compiles, links, and runs on a real Linux kernel
    # without panicking or hitting UB.
    #
    # Phase 2.1 follow-up (NOT done here): boot a QEMU guest with
    # `-numa node,nodeid=0,...  -numa node,nodeid=1,...` so the guest actually
    # shows two NUMA nodes and mbind steers pages between them.  The complexity
    # of reliably booting a QEMU guest in Actions (image download, KVM
    # availability, cloud-image driver quirks) warrants its own task.  For now,
    # `numactl --hardware` is informational only; `kvm-ok` is a soft probe
    # (`|| true`) so the job does not fail on hypervisors that block KVM.
    #
    # NOT per-push (too heavy for an allocator repo change): the `if:` guard
    # below keeps all other jobs unaffected.
    name: NUMA on real Linux kernel (numactl smoke + env-guarded tests)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install numactl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y numactl
      - name: Probe host NUMA topology (informational)
        run: |
          numactl --hardware
          echo "---"
          # On a single-NUMA Actions runner this shows 1 node.  That is expected
          # and correct: the goal of this job is real-kernel compilation + runtime
          # coverage, not multi-node correctness (Phase 2.1 follow-up handles that).
          kvm-ok || true
      - name: Build (production + numa-aware)
        run: cargo build --features "production numa-aware"
      - name: Compile numa_alloc tests
        run: cargo test --features "production numa-aware" --test numa_alloc --no-run
      - name: Compile numa_segment_id tests
        run: cargo test --features "production numa-aware" --test numa_segment_id --no-run
      - name: Compile numa_seam tests
        run: cargo test --features "production numa-aware" --test numa_seam --no-run
      - name: Run numa_alloc tests (env-guarded)
        env:
          SEFER_NUMA_TEST: "1"
        run: cargo test --features "production numa-aware" --test numa_alloc -- --nocapture
      - name: Run numa_segment_id tests
        run: cargo test --features "production numa-aware" --test numa_segment_id -- --nocapture
      - name: Run numa_seam tests
        run: cargo test --features "production numa-aware" --test numa_seam -- --nocapture

  fuzz-build:
    # BUILD-ONLY gate for the libFuzzer targets (`region_ops`,
    # `global_alloc_ops`, `heap_core_ops`). Running the fuzzers is CPU-hour
    # heavy and lives on a separate scheduled/manual cadence (see
    # fuzz/README.md) — this job does NOT run them. It only compiles all three
    # targets on nightly so fuzz-target bit-rot (an API change that breaks a
    # harness) is caught per-push, not months later at the next campaign.
    name: fuzz targets build (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          # cargo-fuzz links the sanitizer runtime against the *prebuilt* std of
          # the build target. Its default target on this runner resolves to
          # `x86_64-unknown-linux-musl`, whose std is NOT installed (E0463:
          # can't find crate for `std`). Force the gnu target below (its std
          # ships with the toolchain); add rust-src as belt-and-suspenders in
          # case a future cargo-fuzz build-std's the sanitizer runtime.
          targets: x86_64-unknown-linux-gnu
          components: rust-src
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # `cargo fuzz build` compiles every registered target under the fuzz
      # crate (its own workspace root); no target is executed. Pin the gnu
      # target so the sanitizer build links a std that actually exists on the
      # runner (see the toolchain note above).
      - name: Build fuzz targets
        working-directory: fuzz
        run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    # `RUSTDOCFLAGS: "-D warnings"` removed for the same reason as the top-level
    # `-D warnings` removal — many intra-doc links into `#[doc(hidden)]`
    # modules produce warnings that are not PR blockers.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # All-features so every intra-doc link (including the gated tiers) resolves.
      - run: cargo doc --no-deps --all-features

  deny:
    # SEC-5 (task #202): machine-check RustSec advisories AND license
    # compatibility in one job, closing the §1.3 / §1.6 #3 / §2.2 gap from
    # docs/security/SECURITY_COMPLIANCE_AUDIT_2026-07-06.md. Uses cargo-deny
    # (not cargo-audit alone) because it covers BOTH concerns in one tool.
    # `cargo deny check` with no sub-args runs all four check categories
    # (advisories, licenses, bans, sources) — kept broad so a future bans or
    # source-policy tightening (currently permissive per the task scope) is
    # already wired into the job. Config lives at repo-root `deny.toml`.
    name: cargo-deny (advisories + licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check
