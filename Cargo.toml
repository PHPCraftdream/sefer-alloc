# R13-6 (task #276): production A/B wall-clock gate for the
# `exact-span-large` (R12-3) + `large-reserved-capacity` (R12-4) opt-in pair
# (`benches/r13_6_exact_span_reserved_capacity_wallclock.rs`). Two groups:
