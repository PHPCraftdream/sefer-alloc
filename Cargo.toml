# RAD-1 / Phase 0(a): process-per-sample first-alloc RSS + latency probe — the
# E1 registry-bootstrap judge. Measures the ~16 MiB first-touch cost of the
# registry `next_free` materialisation, which is invisible to Criterion/iai (they
# run many iterations in one long-lived process where the pages are already
# resident). Driven by `scripts/first-alloc-bench.mjs`, which runs this binary
