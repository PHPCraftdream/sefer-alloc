# 8 / §6 Stage A.5): independent-alloc/free sweep JUDGE for the SMALL_MAX
# architectural cliff (258,752 B, per-segment small path -> 262,144 B literal
# 256 KiB, one dedicated 4 MiB span per object). Custom timing-loop binary
