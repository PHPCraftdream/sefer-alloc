[package]
name = "sefer-alloc"
version = "0.1.0"
edition = "2021"
# Matches the resocks5 ecosystem floor; the core is plain safe Rust and will
# build on much older toolchains, but we pin a known-good MSRV from day one.
rust-version = "1.88"
license = "MIT OR Apache-2.0"
description = "A safe, handle-addressed region store: generational handles instead of pointers, a dense cache-friendly core with zero unsafe, and a verification-first build."
readme = "README.md"
keywords = ["arena", "slotmap", "generational", "handle", "allocator"]
categories = ["data-structures", "memory-management"]

# Standalone workspace root — prevents accidental capture by an ancestor
# workspace if this repo is ever nested under one.
[workspace]

[features]
# Phase 3b-I: lock-free reads via `arc-swap` RCU with page-granularity copy-on-write
# — zero `unsafe` of our own. The concurrent tier is opt-in; the default build
# pulls in only `slotmap`. See docs/PLAN.md.
experimental = ["dep:arc-swap"]

[dependencies]
# Phase 1: the single-threaded engine — an audited, battle-tested slotmap with
# years of production exposure and fuzzing. Our crate wraps it in a thin typed
# membrane and stays `#![forbid(unsafe_code)]`; slotmap's internal `unsafe`
# does the Cartographer/Hand job for the single-threaded core. See docs/PLAN.md.
slotmap = "1"
# Phase 3b-I: atomic snapshot publication for lock-free reads. Optional — only
# the `experimental` concurrent tier pulls it in. Its internal `unsafe` is the
# dependency's, not ours; our crate stays `#![forbid(unsafe_code)]` with it on.
arc-swap = { version = "1", optional = true }

[dev-dependencies]
# Phase 0 dependency: property-based differential testing against a reference
# model. This is the heart of the verification-first build — see docs/PLAN.md.
proptest = "1"
# Phase 2: criterion benches that empirically choose the single-threaded
# backing container (SlotMap vs DenseSlotMap vs HashMap vs Vec<Box<T>>) across
# the iterate / lookup / churn axes. See docs/BENCHMARKS.md for the verdict.
criterion = "0.5"

[[bench]]
name = "locality"
harness = false
