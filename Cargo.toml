# source change; it exists so the blocked-on-this-task R6-OPT-P0-3 (a
# prototype "medium allocator" for 256 KiB-2 MiB) can honestly prove its
# claimed win against a real baseline. Only requires `alloc-core`; the
# cross-thread variant additionally needs `alloc-global` + `alloc-xthread`
# (gracefully skipped, with a clear message, when absent).
[[bench]]
name = "medium_size_sweep"
harness = false
required-features = ["alloc-core"]

# R6-OPT-A4 (radical_optimization_review §4 P1-6 measurement plan / §5.5 item
# 7 / §6 Stage A.5): deterministic multi-segment directory-scan JUDGE for
# `AllocCore::find_segment_with_free_impl`'s O(segments) scan
# (`src/alloc_core/alloc_core_small.rs`). Three prior optimisation attempts
# (X5, T10, R5-R1) measured ~zero improvement because the only existing judge
# that exercises this scan, `perf_gate_iai.rs`'s `multiseg_cold_256k`, builds
# only 3 segments — deep in the flat region of any O(S) curve. This harness
# deterministically constructs exactly S in {1, 3, 16, 64, 256, 1023}
# registered segments (verified via the pre-existing `dbg_table_count` test
# seam, never assumed), sweeps hole fractions {0, 25, 50, 75}% and (a
# representative subset of, tiered via --reduced/--full-matrix) all 49 small
# classes, and reports segment-scan-triggering alloc() wall-clock
# (mean/p50/p99) plus the analytically-known worst-case segment count walked
# (deterministic by construction at holes=0%). A separate alloc-xthread-gated
# matrix seeds a controlled fraction of segments with genuinely pending
# cross-thread-freed blocks via real `HeapCore`/`HeapRegistry::claim`
# cross-thread `dealloc` calls (never the `dbg_push_to_ring` test seam).
# Custom timing-loop binary (harness = false) — same reasoning as the R6-OPT-
# A2/A3 siblings: Criterion's b.iter() model does not fit "construct S
# segments once (untimed), time a batch of scan-triggering allocs, tear down,
# repeat". Stage A — a measurement harness only; `find_segment_with_free_impl`
# and its callers are read-only inputs, untouched by this task. Exists so a
# later task (R6-OPT-P1-6, a full per-class segment directory) can be
# honestly evaluated against a judge that actually crosses into the region
# where O(S) bites. Only requires `alloc-core`; the remote-dirty-density
# matrix additionally needs `alloc-global` + `alloc-xthread` (gracefully
# skipped, with a clear message, when absent).
[[bench]]
name = "segment_directory_sweep"
harness = false
required-features = ["alloc-core"]

# R7-A0: transition-zone probe for the P5 directory-materialization threshold.
# Measures S = 32..63 at SMALL_MAX, holes = 0 — the gap between the main
# sweep's S = 16 and S = 64 points.
[[bench]]
name = "directory_threshold_probe"
harness = false
required-features = ["alloc-core"]

# R5-R4 (round5 performance review §3 N1, §8.2 item 1, §10 Stage A.3/C):
# isolates round4's N1 change's teardown cost (AbandonGuard::drop wiring ->
# HeapCore::trim_for_recycle) from pure per-op allocation throughput. Reports
# ops-only throughput, an isolated drain-only cost (via
# SeferAlloc::dbg_trim_current_thread), and the full real thread-exit
# lifecycle (spawn -> N ops -> join, letting AbandonGuard::drop run for
# real) as SEPARATE bench groups, swept over N = 1 / 1_000 / 100_000
# operations per thread lifetime. See the bench file's module doc for the
# full rationale and the "subtract the empty-thread-spawn reference" method.
[[bench]]
name = "heap_lifecycle_teardown"
harness = false
required-features = ["alloc-global"]

# Task #62 §A-2: synthetic async-like allocation pattern — mixed-size
# alloc/dealloc/realloc (row buffers, accumulators, medium blobs) via
# SeferAlloc::GlobalAlloc called directly. No tokio runtime noise, no
# channels, no spawns. Single-threaded DBMS-pipeline simulation.
# Documented in docs/PROFILE_FLAMEGRAPHS.md §6.
[[bench]]
name = "heap_async_pattern"
harness = false
required-features = ["alloc-global"]

# Task #127: CI perf-gate — instruction-count regression guard via
# `iai-callgrind` (Callgrind emulation is deterministic run-to-run, unlike
# wall-clock criterion, so it tolerates a tight ~5-10% threshold on a shared
# CI runner without flaking). Linux-only: the harness is
# `#![cfg(target_os = "linux")]`-gated and the `iai-callgrind` dev-dependency
# is scoped to `cfg(target_os = "linux")` (see [target.'cfg(target_os =
# "linux")'.dev-dependencies] above), so `cargo build --benches` on
# Windows/macOS simply does not build this target's real body — `harness =
# false` still lets Cargo probe/compile the (empty-on-non-Linux) crate.
# Driven by `.github/workflows/perf-gate.yml`, NOT the default `cargo bench`
# path (requires `cargo install iai-callgrind-runner` + valgrind).
[[bench]]
name = "perf_gate_iai"
harness = false
required-features = ["alloc-global"]

# R11-5: per-call cost of `numa::current_node()` (real OS syscall / Win32 API
# call) vs the new cached accessor `AllocCore::current_node_cached()`. Reports
# both a 1-call-per-iter view (per-call syscall cost vs per-call cache-hit
# cost) and a batch-of-1024 view (the amortised cost shape a single
# slot-claim lifetime sees, modelling a realistic `find_segment_with_free`
# miss count). Windows/single-NUMA: measures the two Win32 API calls; the
# Linux sysfs-loop cost (the more dramatic case) is NOT measured here (no
# multi-node Linux hardware on this host) — see the bench file's module doc
# for the honesty note. Requires `numa-aware`.
[[bench]]
name = "numa_current_node_cache"
harness = false
required-features = ["numa-aware"]

# Task #52: tokio async burn-in — SeferAlloc as #[global_allocator] under a
# real tokio multi-thread runtime with a DBMS-pipeline-like async workload.
# All tokio-internal allocations also go through SeferAlloc.
# Run: `SEFER_BURNIN_SECONDS=10 SEFER_TOKIO_WORKERS=4 SEFER_BURNIN_TASKS=256 \
#        cargo run --release --example tokio_burn_in \
#        --features "alloc-global alloc-xthread"`
[[example]]
name = "tokio_burn_in"
required-features = ["alloc-global", "alloc-xthread"]

# ── §0 — Flamegraph profiling: debug-info is OPT-IN, NOT persistent ──────────
#
# Persistent `debug = true` in [profile.release] / [profile.bench] slows linking
# and inflates `.rlib` / rmeta sizes noticeably for every `cargo build --release`
# (even non-profiling runs). We therefore do NOT set `debug` in [profile.*]
# below — codegen tuning (lto/codegen-units) is a separate axis from
# debug-info and does not carry that cost.
#
# Instead: pass the env var once, at profiling time:
#
#   CARGO_PROFILE_BENCH_DEBUG=line-tables-only \
#     cargo build --bench heap_xthread \
#       --features "alloc-core alloc-xthread" --profile bench \
#       CARGO_TARGET_DIR=/tmp/sefer-fg-v3a
#
#   CARGO_PROFILE_RELEASE_DEBUG=line-tables-only \
#     cargo build --release --example malloc_macro \
#       --features "alloc-global alloc-xthread" \
#       CARGO_TARGET_DIR=/tmp/sefer-fg-v3a
#
# `line-tables-only` gives adequate function names + file/line for flamegraphs
# without the full DWARF variable info that `true`/`full` would add.
# Documented in docs/PROFILE_FLAMEGRAPHS.md §0.

# ── §0b — Release/bench codegen tuning (PERF-PASS-1 / task #49, G6/A1) ──────
#
# No [profile.*] section existed before this. mimalloc's C core is compiled
# by its build script at full optimization; the Rust side was running at the
# Cargo default of 16 codegen units with no LTO and unwind landing pads on
# every call. `codegen-units = 1` + `lto = "thin"` reliably improves register
# allocation/code layout on the branchy ~30-instruction alloc/free fast path.
# Known consequence: this shifts `npm run iai` instruction-count baselines —
# re-pin docs/perf/IAI_BASELINE.md after landing this (see that file's own
# regeneration rule). See docs/reviews/2026-07-10-perf-memory-layout-review.md
# finding 3 for the full rationale.
[profile.release]
lto = "thin"
codegen-units = 1

[profile.bench]
lto = "thin"
codegen-units = 1
# NOTE: `panic = "abort"` was tried here per the review's "optionally" clause
# but Cargo unconditionally ignores `panic` for the `bench`/`test` profiles
# (warns "`panic` setting is ignored for `bench` profile") because the
# libtest/criterion harness requires unwinding to catch a failing
# iteration/assertion. Left out; `lto`/`codegen-units` still apply.
