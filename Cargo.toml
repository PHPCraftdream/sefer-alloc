# own binary target (it has no `main`) — each `paired_ab_*` binary pulls it in
# via `include!`, not `mod`/`use`.
[[example]]
name = "paired_ab_sefer"
required-features = ["alloc-global"]

[[example]]
name = "paired_ab_mimalloc"

[[example]]
name = "paired_ab_system"

