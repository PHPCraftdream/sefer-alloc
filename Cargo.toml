[package]
name = "sefer-alloc"
version = "0.3.0"
edition = "2021"
# Matches the resocks5 ecosystem floor; the core is plain safe Rust and will
# build on much older toolchains, but we pin a known-good MSRV from day one.
rust-version = "1.88"
license = "MIT OR Apache-2.0"
description = "A safe-by-construction, 100% Rust memory toolkit (no C/C++ libraries — no libnuma/mimalloc/jemalloc/snmalloc/tcmalloc): a single-threaded handle store (Region<T>) and a drop-in #[global_allocator] (SeferAlloc) over one verified segment substrate. The base crate is #![forbid(unsafe_code)]; the allocator features flip the crate root to #![deny(unsafe_code)] with unsafe confined to a small, audited seam set (see the README unsafe-boundary section)."
readme = "README.md"
repository = "https://github.com/PHPCraftdream/sefer-alloc"
homepage = "https://github.com/PHPCraftdream/sefer-alloc"
documentation = "https://docs.rs/sefer-alloc"
keywords = ["allocator", "arena", "generational", "handle", "lock-free"]
categories = ["data-structures", "memory-management", "concurrency", "no-std"]
# Dev-only tooling excluded from the published crates.io tarball: the Node
# hardening-sweep runners (loom/miri/TSan), CI workflows, and session
# checkpoints are irrelevant to a downstream consumer of the library.
exclude = [
    "scripts/",
    "package.json",
    ".github/",
    "docs/checkpoints/",
]

# docs.rs: build the rendered documentation with the full `production` feature
# bundle so the `SeferAlloc`/`AllocStats`/registry API pages (all gated on
# `alloc-global` and friends) are present and their intra-doc links resolve.
# A plain default-feature `cargo doc` does not compile those items, so the
# crate-root overview refers to them as inline code rather than links to stay
# warning-clean under every feature configuration (task #136).
[package.metadata.docs.rs]
features = ["production"]

# Workspace root. `sefer-alloc` is the root crate AND the workspace; the
# extracted, independently-publishable building blocks live under `crates/`:
#   - sefer-region    (crates/region)       — typed handle store (Handle<T>/Region<T>)
#                                             #![forbid(unsafe_code)]
#   - aligned-vmem    (crates/vmem)         — OS virtual-memory aperture
#                                             #![allow(unsafe_code)], single-purpose, audit-friendly
#   - numa-shim       (crates/numa)         — dependency-free NUMA detection + binding
#                                             #![allow(unsafe_code)], single-purpose, audit-friendly
#   - malloc-bench-rs (crates/malloc-bench) — portable GlobalAlloc benchmark harness
#                                             standalone, not in sefer-alloc runtime dep tree
#   - racy-ptr-cell   (crates/racy-ptr-cell)— lazy CAS-published pointer cell
#                                             #![allow(unsafe_code)], single-purpose, real-type loom
#   - ring-mpsc       (crates/ring-mpsc)    — bounded MPSC index ring (owned OR raw
#                                             memory) + DirtyRouter; #![allow(unsafe_code)]
#                                             for the raw tier, single-purpose, real-type loom.
#                                             NOT yet in sefer-alloc's runtime dep tree — the
#                                             in-tree RemoteFreeRing/HeapOverflow swap is a
#                                             filed follow-up (see CRATE-P4 report).
#   - globalalloc-model (crates/globalalloc-model) — differential op-stream harness:
#                                             GlobalAlloc-vs-model M1-M4 oracles +
#                                             proptest/arbitrary front-ends; dev-only
#                                             test infra, NOT in sefer's runtime dep tree.
#   - tagged-index-stack (crates/tagged-index-stack) — ABA-tagged Treiber free-index
#                                             stack (a slot recycler): packed
#                                             `index | tag` head word, const-generic
#                                             INDEX_BITS, slot-resident OR owned links.
#                                             #![forbid(unsafe_code)], no_std, real-type
#                                             loom. sefer's registry `free_slots` uses it.
#   - proc-memstat    (crates/proc-memstat) — same-instant RSS + commit-charge + peak-RSS
#                                             self-probe (bytes, one snapshot call);
#                                             #![allow(unsafe_code)] tier-1 seam (Windows
#                                             K32GetProcessMemoryInfo / macOS task_info /
#                                             Linux /proc). Dev-only: the three process-probe
#                                             examples consume it; NOT in sefer's runtime dep tree.
#   - proc-probe      (crates/proc-probe)    — the `RESULT key=value` stdout protocol every
#                                             fresh-process judge shares (`emit`/`emit_u64`/…),
#                                             re-exporting proc-memstat's `snapshot`/`MemStat`
#                                             so a probe has ONE "measure + report" dependency.
#                                             #![forbid(unsafe_code)] (FFI stays in proc-memstat).
#                                             Dev-only: the process-probe examples emit through it;
#                                             NOT in sefer's runtime dep tree.
#   - size-classes    (crates/size-classes)  — const-built size-class table + derived
#                                             O(1) size->class lookup + alignment-jump
#                                             classifier; #![forbid(unsafe_code)], no_std.
#                                             sefer's size_classes.rs is a thin shim over it.
# Each is a real crates.io crate someone can `cargo add` on its own; sefer-alloc
# re-exports sefer-region's surface for backward compatibility, and delegates its
# OS-unsafe seams to aligned-vmem and numa-shim (thin interop wrappers).
[workspace]
members = ["crates/vmem", "crates/numa", "crates/malloc-bench", "crates/region", "crates/racy-ptr-cell", "crates/ring-mpsc", "crates/size-classes", "crates/globalalloc-model", "crates/tagged-index-stack", "crates/proc-memstat", "crates/proc-probe"]
resolver = "2"

# Workspace-shared lint table — every loom-aware member (this root package +
# racy-ptr-cell + ring-mpsc + tagged-index-stack) inherits it via
# `[lints] workspace = true`, so the `loom` / `kani` build-time cfgs are declared
# once for the whole tree. `kani` is root-only; a member that never sets it just
# has a harmless unused check-cfg entry.
[workspace.lints.rust]
# `loom` is a build-time cfg (set via `RUSTFLAGS="--cfg loom"`) that gates the
# loom model-check harness; `kani` gates the kani proof harnesses (root only).
# Declare both so `unexpected cfg` warnings are silent across the workspace.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(loom)', 'cfg(kani)'] }

[lints]
# Inherit the workspace-shared lint table above ([workspace.lints.rust]).
workspace = true

[features]
# The single-threaded core (`Region<T>` / `Handle<T>`) needs only `alloc` and
# builds under `no_std`. `std` (default-on) is required only for `SyncRegion`
# (it wraps `std::sync::RwLock`) and the concurrent tier. Disable default
# features to get the bare `no_std` + `alloc` core.
default = ["std"]
std = ["sefer-region/std"]
# Phase 3b: lock-free reads. The concurrent tier is opt-in; it requires `std`
# (its deps need it) and pulls in only `arc-swap` + `crossbeam-epoch` beyond the
# core.
# - 3b-I (`arc-swap`): RCU with page-granularity copy-on-write — zero `unsafe`
#   of our own.
# - 3b-II (`crossbeam-epoch`): per-slot atomics + epoch reclamation — the single
#   confined `unsafe` Hand organ (src/concurrent/hand.rs), the only module with
#   `#![allow(unsafe_code)]`. See docs/PLAN.md.
experimental = ["std", "dep:arc-swap", "dep:crossbeam-epoch"]
# Phase 7c: thread-per-core pinning. Additive over `experimental` — pulls in
# `core_affinity` (a safe wrapper over the OS affinity syscalls; zero `unsafe`
# of our own) and exposes an explicit shard-binding API plus a thread-per-core
# runner on `ShardedRegion`. The default and `experimental` builds do NOT pull
# `core_affinity`: this feature is purely opt-in. See docs/PLAN.md §7c.
#
# NOTE (review 2.5): `pinning` inherits ALL of `experimental`'s deps — including
# `arc-swap` + `crossbeam-epoch` (the legacy research concurrent tier) — even
# though `PinnedRunner` itself uses ONLY `core_affinity` + `ShardedRegion`
# (`src/concurrent/pinning.rs`; `sharded_region.rs` references neither arc-swap
# nor crossbeam-epoch). It depends on `experimental` because `ShardedRegion` is
# gated there, not because it needs the epoch/RCU types. Narrowing this (moving
# `ShardedRegion` behind a leaner sub-feature so `pinning` need not drag in the
# whole legacy tier) is a real feature-graph refactor and is intentionally NOT
# attempted here; documented as a known, accepted over-inclusion.
pinning = ["experimental", "dep:core_affinity"]
# Phase 8: the segment substrate + self-hosted metadata — the foundation of a
# real allocator (the Membrane Inversion). OS-backed SEGMENT-aligned spans via a
# confined `unsafe` aperture (`mmap`/`VirtualAlloc`, NO `std::alloc` anywhere),
# a self-hosted `SegmentTable` carved from the first primordial segment,
# per-segment `PageMap` / `BinTable`, and single-threaded
# `alloc`/`dealloc`/`realloc`/`alloc_zeroed`. The alloc path is provably
# reentrancy-free (M5): no `Vec`/`Box`/`HashSet`/`std::alloc`/`format!` is
# reachable — all metadata self-hosts in segment memory. This is single-threaded
# correctness-first; per-thread heaps + concurrency are Phases 9–10. Introduces
# two confined-`unsafe` modules — `alloc_core::os` (the OS aperture) and
# `alloc_core::node` (the intrusive free-list node seam, the generalized `hand`
# discipline) — so the crate switches to `deny(unsafe_code)` with this feature
# on; `unsafe` outside those modules stays a hard error. Requires `std` (the OS
# syscalls are std-gated). See `docs/ALLOC_PLAN.md` §5 P8 and §6.
alloc-core = ["std", "dep:aligned-vmem", "dep:racy-ptr-cell", "dep:size-classes"]
# Cross-thread free support. Adds per-segment `RemoteFreeRing`s (lock-free
# SPSC rings) for cross-thread `dealloc`, the `dealloc_any_thread` entry point,
# owner stamping on segment headers, and the whole-slot-reuse teardown model
# (`AbandonGuard::drop` recycles the slot with the `HeapCore` staying whole —
# all segments and their remote-free queues are preserved for the next claimant
# to reclaim lazily; the old abandon/adopt segment-transfer substrate was
# removed in task #97 / R4-5 — see CHANGELOG.md). Without this feature, the
# `alloc-core` substrate provides single-thread-only allocation (sound: single
# owner, no cross-thread refs). Requires `alloc-core`.
alloc-xthread = ["alloc-core"]
# Phase 11: the drop-in `GlobalAlloc` face -- `SeferAlloc`. Installs over the
# per-thread `HeapCore` substrate via the registry-backed raw-pointer TLS
# binding (allocation-free lazy init). The `unsafe impl GlobalAlloc` is the
# single new `unsafe` surface of this phase -- it is the documented malloc-face
# seam (the trait is `unsafe`; the body delegates to the already-proven safe
# `HeapCore` entry points). Every entry point is no-panic (a panic in a global
# allocator aborts the process): checked branches return null on OOM, never
# panic/abort. Reentrancy-free (M5) is upheld structurally: no
# `Vec`/`Box`/`HashSet`/`std::alloc`/`format!` on the path -- the TLS init is
# the lazy allocation-free discipline. Requires `alloc-core`. Add `alloc-xthread`
# alongside it for the multi-thread face (cross-thread `dealloc` via
# per-segment `RemoteFreeRing`s).
alloc-global = ["alloc-core", "dep:tagged-index-stack"]
# R10-7 follow-up: the tcache-aware batch allocation API
# (`SeferAlloc::alloc_batch` / `dealloc_batch` + the underlying
# `HeapCore::alloc_batch`). EXPERIMENTAL — opt-in, NOT part of `production`
# or any other default-on bundle, and NOT implied by any of them.
# `--all-features` pulls it in (as it does every other opt-in feature here),
# which is intended: that build tier compiles and tests every feature
# combination.
#
# ## Why a dedicated feature (not just `#[doc(hidden)] pub`)
#
# The R10-7 external review flagged that `#[doc(hidden)] pub fn` is STILL
# formally public Rust API: the attribute only hides the item from rustdoc,
# not from the semver/ABI surface external code can call. A future
# breaking change to the batch signature would still be a semver break.
# Gating the whole surface behind this feature makes the boundary REAL:
# downstream code cannot reach `alloc_batch`/`dealloc_batch` at all unless
# it explicitly opts into `batch-api`, so the signature can evolve without
# semver consequences for the vast majority of users (who build with
# `production` alone). This mirrors how `experimental` / `pinning` /
# `hardened` / `numa-aware` etc. already gate this crate's other opt-in
# surfaces.
#
# Additive over `alloc-core` (matches the convention of every other opt-in
# feature here): on its own it compiles the (non-magazine) fallback
# `HeapCore::alloc_batch` that loops the substrate; alongside `fastbin` it
# compiles the tcache-aware variant. Tests/benches opt in via
# `required-features` or `#![cfg(feature = "batch-api")]`.
#
# R12-12 (P2, two consecutive external reviews starting at R10): also
# requires `experimental`. A Cargo feature gate alone is not a strong enough
# signal that this surface carries no semver guarantees — a user who enables
# `--features batch-api` in isolation (e.g. copy-pasting a Cargo.toml line
# from a benchmark) would reasonably assume it is as stable as any other
# opt-in feature. Nesting it under `experimental` (which this crate already
# uses as its "no semver guarantees, research-tier" umbrella for `pinning` /
# the RCU+epoch concurrent tier) makes the instability an explicit,
# unmissable opt-in: `--features batch-api` now pulls in `experimental`
# transitively (Cargo feature unification), so nothing that worked before
# stops compiling — it just also enables `experimental`'s own surface. No
# cycle: `experimental` itself stays `["std", "dep:arc-swap",
# "dep:crossbeam-epoch"]` and does not list `batch-api` (or anything that
# lists `batch-api`) among its own requirements.
batch-api = ["experimental", "alloc-core"]

# R12-11 (task #262, P2): DIAGNOSTIC-ONLY per-page class bookkeeping
# (`alloc_core::segment_header::PageMap`). An inventory of every PageMap call
# site confirmed the module doc's own claim: no production `alloc`/`dealloc`/
# `realloc`/cross-thread-reclaim path derives a block's size class from
# `PageMap` — the class is always carried authoritatively by the caller's
# `Layout` (own-thread free, `AllocCore::dealloc_small`) or the
# `RemoteFreeRing` entry (cross-thread free, `reclaim_offset`). The ONLY
# thing that ever calls `PageMap::class_of` is the doc-hidden test seam
# `AllocCore::dbg_page_map_class_for`.
#
# That seam is, however, a genuine load-bearing test ORACLE: the §13
# counterfactual regression gates (`tests/phase13_3_dealloc_layout_class.rs`,
# `tests/phase13_drain_reclaim_layout_class.rs`) and two more correctness
# tests (`tests/regression_carve_batch.rs`,
# `tests/medium_classes_correctness.rs`) construct a mixed-class page on
# purpose and PROVE the real dealloc/reclaim path does NOT reroute by
# `page_map`'s class by comparing it against the `Layout`-derived class. Those
# tests need `PageMap` to actually be maintained (written) to have anything to
# compare against — so PageMap could not simply be deleted without breaking
# the very gate that protects the invariant it documents.
#
# This feature therefore gates the WRITE sites only — `PageMap::init_in_place`
# (bootstrap, ×2), `carve_block`'s / `carve_batch`'s per-distinct-page
# `set_class` "first class wins" stamp, and the decommit-reset `set_free`
# re-marking loop (`alloc_core_small_pool.rs`) — out of the default/production
# build. The `PageMap` struct, its FOOTPRINT, and its offset in `Layout` stay
# UNCONDITIONAL (present in every feature config) so the segment metadata
# byte layout never shifts with this feature on/off — only the per-segment/
# per-carve WORK of maintaining it is elided. With this feature OFF (the
# default, and NOT part of `production`), the carve/reset hot paths save the
# `class_of` read + conditional `set_class` write (per distinct payload page)
# and the once-per-segment `init_in_place` sweep; `PageMap`'s bytes are simply
# never written, so `dbg_page_map_class_for` is not meaningful and the 4 test
# files above require this feature explicitly. `--all-features` pulls it in,
# as it does every other opt-in feature here. Additive over `alloc-core`.
page-map-diag = ["alloc-core"]

# Phase 35: M6 decommit — return the payload pages of an empty small segment to
# the OS (Win `VirtualFree MEM_DECOMMIT` / unix `madvise MADV_DONTNEED`) when its
# live-block count drops to zero, recommitting on first reuse. Additive over
# `alloc-core`: it adds an owner-only `live_count` field to the segment header
# (the field is present in EVERY build's layout so the byte layout is stable;
# its mutation/read is gated on this feature) and wires the decommit/reset/
# recommit policy into the own-thread free + cross-thread reclaim + carve paths,
# all under `#[cfg(feature = "alloc-decommit")]`. With this feature OFF the
# default build is byte-for-byte unchanged. NO new dependency and NO new `unsafe`
# site — the OS seam (`os::decommit_pages`/`recommit_pages`) already exists; the
# new bookkeeping is plain safe arithmetic through the `node` seam. M6 is
# decommit-safe WITHOUT crossbeam-epoch / M11 — see the safety argument at the
# decommit point in `alloc_core` and `docs/PHASE35_DECOMMIT_DESIGN.md` §1.
# Requires `alloc-core`. Default OFF.
alloc-decommit = ["alloc-core"]
# Convenience alias: the recommended feature set for long-running multi-thread
# workloads (DBMS-style, async runtimes, anything that creates and frees many
# segments over time). Without `alloc-decommit` the SegmentTable free-list
# still recycles freed large-segment slots unconditionally, but empty
# small segments cannot be recycled until they are decommitted; long-running
# processes with many small-segment carve/decay cycles will pin slots and
# eventually hit the 1024 cap. `alloc-decommit` closes this by decommitting
# empty small segments and freeing their slot (#60). Add this feature for any long-running deployment.
# R12-3 (P0-perf, EXPERIMENTAL A/B): size the Large/huge dedicated segment to
# the exact page-rounded request (`round_up(header + size, OS page)`) instead
# of rounding up to a whole number of `SEGMENT` (4 MiB) spans. Every Large
# request today reserves+commits a MINIMUM of 4 MiB regardless of how much it
# actually needs (a 260 KiB request pays for 4 MiB — ~15x amplification).
#
# The segment's ALIGNMENT stays `SEGMENT` (4 MiB) unconditionally — only the
# physical `usable` byte count shrinks. `crates/vmem`'s `reserve_aligned(size,
# align)` already supports `size != align` on both backends (Windows
# `win_reserve_commit` / Unix `unix_reserve`: both over-reserve
# `size + align`, then trim to an `align`-aligned `size`-byte span for
# ARBITRARY `size`, not just multiples of `align`); the `try_reserve_aligned`
# contract only requires `size` to be a non-zero multiple of `PAGE`, never a
# multiple of `align`. `os::Segment::reserve` and the stale comment beside the
# old `n_segments * SEGMENT` computation in `alloc_core_large.rs` describing
# this as a hard backend requirement predate that finding — the real backend
# constraint is page-granularity only. Because the span stays SEGMENT-aligned,
# `segment_base_of_ptr` (which masks on `SEGMENT`) is unaffected.
#
# Scope: this changes ONLY the physical `usable` byte count computed in
# `AllocCore::alloc_large`/`alloc_large_slow`. The large-cache policy
# (best-fit size-factor matching, `span_usable` bookkeeping, owner stamping,
# cross-thread routing, the OPT-G in-place-grow fast path) is untouched — it
# already treats `usable`/`span_usable` as an opaque byte count, not a
# SEGMENT-multiple, so it works unchanged with a smaller `usable`. The
# trade-off: OPT-G in-place `realloc` growth has less committed headroom to
# grow into before falling back to the slow (alloc+copy+free) path — see
# R12-4 for a proposed follow-up (Windows lazy-commit reserved-capacity
# growth).
#
# EXPERIMENTAL: opt-in, NOT part of `production` or any other default-on
# bundle. `--all-features` pulls it in (as it does every other opt-in feature
# here). With this feature OFF, `alloc_large`'s `usable` computation is
# byte-for-byte identical to before (rounds up to a whole `SEGMENT`
# multiple) — this feature adds a new path, it does not alter the default
# one. Additive over `alloc-core`.
exact-span-large = ["alloc-core"]
# R12-4 (P0-perf, EXPERIMENTAL Windows-gated-effect prototype): give a
# GROWING Large `realloc` a cheap in-place path when `exact-span-large` has
# shrunk the committed span so far that OPT-G (the existing Large->Large
# in-place-grow fast path — see `AllocCore::realloc_inplace_fast_path_known_base`'s
# doc) rarely has committed headroom to grow into.
#
# Mechanism: `alloc_large_slow` reserves (but does NOT commit) a larger VA
# span up front — `reserved_capacity`, a geometric 2x of the page-rounded
# request capped at `LARGE_RESERVED_CAP_MULTIPLIER * SEGMENT` — via
# `aligned_vmem::reserve_aligned_lazy`, and commits only the page-rounded
# request (`span_usable`, UNCHANGED meaning — see bug #134 / `span_usable`'s
# doc, still the true COMMITTED span, never the reservation). A growing
# realloc that still fits in `reserved_capacity` (but not in the already-
# committed `span_usable`) commits the missing tail via
# `aligned_vmem::commit_range` (ONE extra `VirtualAlloc(MEM_COMMIT)` call on
# Windows) and returns the SAME pointer, with NO copy. A growing realloc that
# exceeds `reserved_capacity` falls through to the existing slow path
# (alloc + copy + free), unchanged.
#
# Portability (mirrors `alloc-lazy-commit`'s own convention — see that
# feature's doc below): the mechanism is written as ONE portable code path
# in `alloc_core` that calls `aligned_vmem`'s lazy-reserve/commit-range
# primitives; there is NO `#[cfg(windows)]` in `alloc_core` itself. On Unix
# and under miri, `aligned_vmem::reserve_aligned_lazy`/`commit_range` are
# no-ops that already commit (or model) the WHOLE span eagerly at reserve
# time (see `aligned-vmem`'s Unix/miri backends), so `reserved_capacity`'s
# extra VA is already fully committed there too — the in-place grow still
# works, it just never needed a real incremental commit syscall to begin
# with. This is why the feature is documented as "Windows-gated EFFECT" (the
# RSS-deferral benefit is Windows-specific) rather than "Windows-gated CODE".
#
# Requires `exact-span-large` (the mechanism exists to counteract exactly
# that feature's OPT-G headroom loss) and pulls in `aligned-vmem/lazy-commit`
# for the reserve/commit primitives (the same dependency `alloc-lazy-commit`
# pulls in for its own, unrelated, small-segment lazy-commit path).
#
# EXPERIMENTAL: opt-in, NOT part of `production` or any other default-on
# bundle. `--all-features` pulls it in (as it does every other opt-in
# feature here). With this feature OFF, `alloc_large_slow` and the OPT-G
# realloc fast path are BYTE-FOR-BYTE IDENTICAL to before — this feature
# adds a new path, it does not alter the default one.
large-reserved-capacity = ["exact-span-large", "aligned-vmem/lazy-commit"]
# R13-7 (P1-perf, EXPERIMENTAL, task #277): widens `AllocCore::large_cache`'s
# fixed 8 base slots (`LARGE_CACHE_SLOTS`) via a lazily-materialised extension
# sidecar of 32 additional slots (40 total) — see
# `src/alloc_core/large_cache_extended.rs`'s module doc for the full design,
# design-alternatives writeup, and motivation
# (`docs/perf/R13_6_EXACT_SPAN_RESERVED_CAPACITY_PRODUCTION_GATE.md` §4).
# Invariants: materialises only on first overflow of the base 8 slots (zero
# cost below that); `large_cache_budget_bytes` remains the primary RSS
# control (slot count only relaxes how many DISTINCT spans may be resident
# within that same byte budget). Requires `alloc-decommit`. EXPERIMENTAL:
# opt-in, NOT part of `production`. With this feature OFF, `AllocCore`'s
# field list, `Drop`, and every large-cache algorithm are byte-for-byte
# identical to before this task.
large-cache-extended = ["alloc-decommit"]
# Phase P2/P4/P7 per-thread magazine cache (tcache) layered over
# `alloc-global`. 0.3.0 (task A2): now ALSO pulls in `alloc-xthread`. Without
# `alloc-xthread`, a cross-thread free of a small block still has to land
# SOMEWHERE — with `fastbin` alone (the old feature set) there was no
# ownership-checked routing path, so a naive cross-thread free would have
# written directly into the magazine/free-list of a heap it does not own: an
# unchecked, unsynchronised write into another thread's private data
# structure — a genuine data race, not merely a missed optimisation.
# `alloc-xthread` is what gives `dealloc_routing` the owner-identity stamp
# (`owner_thread_free`) and the per-segment `RemoteFreeRing` that make a
# cross-thread free safe to route at all; `fastbin` must never be built
# without it. See also the `compile_error!` defence-in-depth guard in
# `src/lib.rs`.
fastbin = ["alloc-global", "alloc-xthread"]
# R13-9 (task #279): `class-aware-dirty` promoted into `production` after a
# full A/B gate (docs/perf/R13_9_CLASS_AWARE_DIRTY_PRODUCTION_GATE.md, GO
# recommendation, user-confirmed): 21.71x SUB-WINDOW ns/owner_alloc win at 8
# concurrent cross-thread producer classes (re-measured on top of R13-1's
# coarse-only OOM latch fix, inside R12-7's own pre-latch 19.7-32.4x range —
# the latch does not erode the win); the FULL-ROUND wall-clock win for the
# same fixed amount of work is far smaller (~11% at N=8, criterion's own
# full-round mean — R14-3/task #288 correction,
# docs/perf/R14_3_CLASS_AWARE_DIRTY_FIXED_WORK_AB.md, since most of the
# sub-window's apparent savings is deferred drain work moving into the
# unmeasured pre-alloc/recycle portion of the round, not disappearing). Zero
# measured cost on non-remote/single-thread paths (iai: +0.00% to +0.02% Ir
# across 12 non-remote benches), ~8 KiB RSS sidecar per materialised heap.
production = ["alloc-global", "alloc-xthread", "alloc-decommit", "fastbin", "alloc-segment-directory", "primordial-lazy-commit", "class-aware-dirty"]
# R8-3 (task #216): `alloc-segment-directory` joined `production` once the two
# regressions that had kept it opt-in were both landed — #214 (commit af7b039,
# R8-1: the O(D×49) remote-dirty directory-sync regression) and #215 (commit
# 09237e0, R8-2: the O(S) linear-scan-on-every-miss, replaced by an
# authoritative directory miss with a periodic self-heal safety net). The
# feature now delivers a net speedup with no known regression: the full
# production test suite passes clean under the combination (175/175 binaries
# green, exit 0, on `cargo test --release --features "production
# alloc-segment-directory" --no-fail-fast`). It opens NO new `unsafe` seam —
# the directory's VM reservation and raw-pointer dereference live in the
# EXISTING `alloc_core::os` `#![allow(unsafe_code)]` seam already counted in
# the production seam inventory (`reserve_directory_sidecar` /
# `deref_directory_sidecar[_mut]`), so the README's "eight active seams"
# figure is unchanged by this promotion.
# Task W3 (0.3.0): opt-in per-hit DIAGNOSTIC counters. When ON, the magazine
# (tcache) and large-segment cache HIT fast paths each bump their heap's
# slot-resident `AtomicU64` hit counter (a Relaxed load+store, ~2 mem-ops per
# hit), and `SeferAlloc::stats().tcache_hits` / `.large_cache_hits` report the
# real process-wide totals. When OFF (the default, and NOT part of
# `production`), those increments are compiled OUT of the hit fast paths and the
# two `stats()` fields read 0. This trades a small hot-path instruction saving
# for the loss of the two production hit-rate diagnostics; enable `alloc-stats`
# (e.g. `--features "production alloc-stats"`) when you want the counters. The
# counter STORAGE (the slot fields + the aggregators) is always present — only
# the per-hit WRITE is gated — so turning the feature on/off never changes the
# ABI/layout, and a build with it off still safely reads 0 from every slot.
#
# Depends on `alloc-core`: on its own `alloc-stats` has nothing to count (the
# per-event increments it gates live in the `alloc-core`/`alloc-global`
# allocator stack), so `--features alloc-stats` alone used to compile a silent
# no-op — a footgun with no guard (review finding 2.4). Pulling in `alloc-core`
# makes the compiler refuse the useless-in-isolation combination: turning the
# stats counters on now transitively enables the allocator whose events they
# count. Safe (every real caller already builds it `alongside production`,
# which pulls `alloc-core`) and a strictly stronger guard than a doc note.
alloc-stats = ["alloc-core"]
# R6-OPT-P0-3a: EXPERIMENTAL "medium" exact size classes — the cheap first
# experiment `docs/agent_reviews_us/radical_optimization_review.md` §4 P0-3
# recommends running BEFORE committing to the larger page-run-layer redesign
# (P0-3b, a separate, not-yet-started task). Extends `SIZE_CLASS_TABLE` with
# six exact classes — 256 KiB / 320 KiB / 384 KiB / 512 KiB / 768 KiB / 1 MiB
# — reusing the EXISTING small-segment substrate verbatim (one segment, one
# size class, BinTable/PageMap/bump-carve — no new segment kind, no page-run
# layer). Without this feature, any allocation above ~253 KiB (`SMALL_MAX`)
# gets a DEDICATED 4 MiB `Segment` + `SegmentTable` slot, however small the
# excess over the old ceiling (`benches/medium_size_sweep.rs`, task R6-OPT-A3,
# documents the resulting ~16x segment-count/fragmentation cliff at the
# 258,752 B -> 262,144 B boundary). With it, e.g. a 256 KiB object shares a
# 4 MiB segment with ~15 same-class siblings instead of owning a whole span.
#
# Additive over `alloc-core` (the size-class table is core substrate, not
# global/xthread/decommit-specific) — matches this crate's established
# "additive over the smallest feature that needs it" convention (compare
# `alloc-stats`/`numa-aware`, both `["alloc-core"]`).
#
# Purely opt-in, like every other experimental feature this crate has ever
# shipped (`experimental`, `pinning`, `numa-aware`, `hardened`) — NOT part of
# `production` or any other default-on bundle, and NOT implied by any of
# them. `--all-features` pulls it in (as it does every other opt-in feature
# here), which is intended: that build tier exists specifically to compile
# and test every feature combination, not to describe a recommended
# deployment profile.
#
# Cost when ON: `SIZE2CLASS` (the O(1) size->class lookup table, one byte per
# `MIN_BLOCK` bucket up to `SMALL_MAX`) grows from ~16 KiB to ~64 KiB of
# `.rodata` — the review's own "acceptable for an experiment" number. Cost
# when OFF: zero — every table/constant this feature touches is behind
# `#[cfg(feature = "medium-classes")]` or derives its size from a `TABLE_LEN`
# constant that is 49 (unchanged) without it, so a non-`medium-classes` build
# is byte-for-byte identical to a build predating this feature.
#
# See `src/alloc_core/size_classes.rs` module doc for the full scheme and
# `benches/medium_size_sweep.rs` for the before/after measurement this
# feature is judged against. Requires `alloc-core`.
medium-classes = ["alloc-core"]
# R9-4 (task #226): EXPERIMENTAL "wide medium" extension layered ON TOP of
# `medium-classes` — three more exact size classes at 1.25 / 1.5 / 1.75 MiB
# (1,310,720 / 1,572,864 / 1,835,008 B) that partially close the "1–2 MiB
# cliff" R8-9 §5 K7 identified at the new `SMALL_MAX` = 1 MiB ceiling the
# six-class `medium-classes` feature introduces. Those three sizes still fit
# 2–3 to a single 4 MiB segment (vs the Large path's 1 object = 1 dedicated
# 4 MiB span), so they recover a real density win at the relocated cliff;
# 2 MiB itself is OUT OF SCOPE here (it fits only 1× per 4 MiB segment, so a
# fixed class for it would carry no density win — R8-9 §5 notes it needs a
# larger medium-arena / page-run layer, a separate follow-up).
#
# This feature is purely additive over `medium-classes` (it implies
# `medium-classes`, which transitively implies `alloc-core`) and is NOT part
# of `production` or any default bundle, exactly like `medium-classes`
# itself. It MUST NOT alter the six-class `EXTRAS` list `medium-classes`
# publishes on its own: under `medium-classes` alone the table stays exactly
# 55 classes / `SMALL_MAX` = 1 MiB (the configuration R9-3 measured for
# promotion), and only under `medium-classes-wide` does the table grow to
# 58 classes / `SMALL_MAX` = 1.75 MiB. Feature-OFF builds (neither
# `medium-classes` nor `medium-classes-wide`) remain byte-for-byte identical
# to a pre-R9-4 build — every constant this feature touches is behind an
# `#[cfg]` whose predicate includes `medium-classes-wide`.
#
# Encoding-headroom note: the hardened `RemoteFreeRing` packed entry's
# 6-bit `class` field has its collision-margin const-assert pinned at
# `SMALL_CLASS_COUNT <= 62` (`src/alloc_core/remote_free_ring.rs`). Adding
# 3 classes takes the count 55 → 58, still strictly below 62 — the
# non-collision argument holds, with a narrower margin (4 headroom values
# instead of `medium-classes`' 7). A future further bump past 62 needs a
# wider field; see the `entry_never_collides_with_ring_slot_empty`
# regression test.
medium-classes-wide = ["medium-classes"]
# R7-A1: per-class segment directory — a lazily-materialised
# `class_nonempty` bitmap sidecar that replaces the O(S) linear scan in
# `find_segment_with_free_impl` with an O(1) bitmap lookup (wired in A3;
# A1 adds the storage + lazy materialisation + rebuild only). Additive
# over `alloc-core` (the segment table and size-class table it indexes
# are core substrate). Since R8-3 (task #216, commit ec7ac34) this is part
# of the `production` bundle — see the note at the `production` definition
# above for the promotion rationale (#214/#215 fixed the two regressions
# that had kept it opt-in). Feature-OFF builds remain byte-for-byte
# semantically identical.
alloc-segment-directory = ["alloc-core"]
# R12-7 stage 2 (task #279 promoted it into `production` in R13-9): a
# lazily-materialised per-(segment, class) dirty-bit sidecar
# (`alloc_core::dirty_by_class::PerClassDirty`) that lets
# `drain_dirty_segments` scan only the segments dirty for the SOUGHT class
# instead of every segment dirty for ANY class. Strictly additive: the
# existing per-segment `dirty_segments` bitmap is unchanged and still set on
# every push; a stale/redundant per-class bit costs at most one wasted visit,
# never a silently-skipped entry (see the module doc's lost-wakeup argument).
# With this feature OFF, `drain_dirty_segments`/`set_dirty_bit_for_segment`
# are byte-for-byte identical to before. Full design in the module doc;
# promotion numbers in `docs/perf/R13_9_CLASS_AWARE_DIRTY_PRODUCTION_GATE.md`
# (see the note at the `production` definition below).
class-aware-dirty = ["alloc-xthread", "alloc-segment-directory", "dep:aligned-vmem"]
# H1 (task #167): PARANOID deploy hardening — opt-in defence-in-depth against
# UNSAFE-CALLER misuse that costs cycles on the free hot path and is therefore
# NOT free enough to enable unconditionally. Default OFF; NOT part of
# `production` (the fast default). Currently gates the interior-pointer free
# guard on BOTH own-thread small-free faces — the `SeferAlloc` per-thread
# magazine (`HeapCore`) AND the substrate (`AllocCore::dealloc_small`, which is
# what any direct `AllocCore` / non-magazine substrate user
# reaches): each verifies `off % block_size(class) == 0` before touching the M2
# oracles, turning a free of a pointer that is not the block start (offset not a
# whole number of block_sizes) into a detected no-op instead of a mis-indexed
# bitmap read → double-issue / free-list corruption. (The cross-thread leg is
# already covered UNCONDITIONALLY by `reclaim_offset`'s identical check.)
# The check is a modulo by a non-power-of-two block_size (a real division, ~tens
# of cycles) on EVERY small free, so it is honestly a paid check — hence gated
# here, not on the production hot path. Additive over `fastbin` (the build that
# has the magazine free path this guards); enabling it without the magazine is a
# no-op. See README "Hardened vs production".
hardened = ["fastbin"]
# NUMA-aware segment reservation: when a new segment is reserved, pages are
# steered to the NUMA node of the calling thread
# (Linux: mbind(2), Windows: VirtualAllocExNuma).
# macOS: no-op (no public NUMA API). Default OFF. Requires `alloc-core`.
numa-aware = ["alloc-core", "dep:numa-shim"]
# R11-5 TEST-ONLY: enables `numa-shim`'s `mock` backend so integration tests
# can script `current_node()`'s return value deterministically (the
# `tests/numa_cache_invalidation.rs` slot-recycle regression uses this to
# mock a DIFFERENT node for the second claim and assert the newly-claimed
# slot's cached value is the NEW mock node, not the stale one from before
# recycling). NOT part of `production` or any other default bundle; pulling
# it in via `--all-features` is intentional (every feature combination must
# compile), and is sound — the platform impls in `numa-shim` are still
# compiled under `mock` (only `#[cfg_attr(feature = "mock", allow(dead_code))]`,
# never `#[cfg(not(feature = "mock"))]`), so the real Linux sysfs loop /
# Windows Win32 path stay type-checked under `--all-features`. Purely
# additive over `numa-aware`.
numa-aware-mock = ["numa-aware", "numa-shim/mock"]
# R7-B0: EXPERIMENTAL incremental Windows commit foundation. Exposes
# `aligned_vmem::reserve_aligned_lazy` (reserve VA + commit only an initial
# sub-range) and `aligned_vmem::commit_range` (commit additional pages within
# an existing reservation). Windows-only optimisation — on non-Windows and
# under miri the lazy path falls back to eager (identical observable
# behaviour). Under `numa-aware`, the lazy path is disabled (falls back to
# eager) to preserve NUMA placement — mirrors the A3 directory approach.
# Additive over `alloc-core`; off by default, NOT part of `production` or
# any default-on bundle. Feature-OFF builds are byte-for-byte identical.
#
# Also pulls in `aligned-vmem/fault-injection`: the R7-B4 grow-on-carve
# rollback tests need to force a REAL commit to fail at an exact point in a
# live allocation sequence (not `aligned-vmem/mock`, which replaces the whole
# backend — sefer needs the real segment reservation + real commit
# accounting under test). `os::commit_pages` delegates to
# `aligned_vmem::fault_injection`'s hook instead of carrying its own
# COMMIT_FAIL_* atomics (absorbed into vmem, CRATE-P2 follow-up).
#
# R12-9 (task #260): `alloc-lazy-commit` is a PURE COMBINATOR — a convenience
# alias that turns on BOTH `primordial-lazy-commit` AND
# `small-segment-lazy-commit` together (the pre-R12-9 behaviour, byte-for-
# byte). No `#[cfg]` in `src/` tests this feature's own name directly; the
# shared frontier mechanism (the `committed_payload_end` field, B2
# grow-on-carve in `carve_block`/`carve_batch`, B3 decommit-aware reuse in
# `decommit_empty_segment_impl`, and every `dbg_*` diagnostic in
# `alloc_core_small_diag.rs`) is genuinely ONE mechanism shared verbatim by
# both the primordial segment and ordinary small segments, so it is gated on
# `any(feature = "primordial-lazy-commit", feature =
# "small-segment-lazy-commit")` instead — either sub-feature alone pulls in
# the whole shared substrate; keeping `alloc-lazy-commit` a pure alias (not a
# `#[cfg]` target of its own) avoids a feature-implication cycle (each
# sub-feature enabling the umbrella, which enables both sub-features, would
# collapse the split back into one feature). What decides "lazy vs eager" for
# each RESERVATION is the sub-feature specifically: `bootstrap::primordial`'s
# `Segment::reserve_lazy` call is gated on `primordial-lazy-commit`;
# `reserve_small_segment`'s `reserve_aligned_lazy` call is gated on
# `small-segment-lazy-commit`. Every pre-existing `--features
# alloc-lazy-commit` build (including all four `tests/lazy_commit_*.rs`
# files) is byte-for-byte unchanged, since this alias still enables both.
alloc-lazy-commit = ["primordial-lazy-commit", "small-segment-lazy-commit"]
# R12-9 (task #260, P1): lazily commit ONLY the primordial (bootstrap)
# segment — `bootstrap::primordial`'s `Segment::reserve_lazy` call commits
# just `[0, primordial_meta_end() + LAZY_FIRST_CHUNK)` up front instead of the
# whole 4 MiB segment (measured ~5.1x smaller first-heap commit, see
# `docs/perf/R12_9_PRIMORDIAL_LAZY_COMMIT.md`). The primordial segment is
# reserved exactly ONCE per process and is PROVABLY excluded from the
# empty→pool→decommit→release lifecycle for its whole lifetime —
# `AllocCore::dec_live_and_maybe_decommit` / `dec_live_batch_and_maybe_decommit`
# (`alloc_core_small_pool.rs`) both hard-gate on
# `matches!(SegmentHeader::kind_at(base), SegmentKind::Small)`, which a
# `SegmentKind::Primordial` base never satisfies ("NEVER decommit the
# PRIMORDIAL segment" — see that function's own comment). So this policy
# never touches the 50-75x decommit/recommit-cycle regression (R8-10, task
# #223) that keeps the sibling `small-segment-lazy-commit` policy out of
# `production` — that regression fired on repeated
# empty→pool→reuse→refill cycles of *ordinary* small segments, a lifecycle
# the primordial segment structurally never enters. Also pulls in
# `aligned-vmem/fault-injection` for the same B2/B4 fault-injection reason as
# the original `alloc-lazy-commit`. Part of `production` since R12-9 (the
# measured GO in `docs/perf/R12_9_PRIMORDIAL_LAZY_COMMIT.md`, confirmed by
# the user): the sibling `small-segment-lazy-commit` stays opt-in only.
# Feature-OFF: the primordial reservation is the plain eager
# `Segment::reserve`, byte-for-byte unchanged from pre-R12-9.
primordial-lazy-commit = [
    "alloc-core",
    "aligned-vmem/alloc-lazy-commit",
    "aligned-vmem/fault-injection",
]
# R12-9 (task #260, P1): lazily commit ordinary (non-primordial) small
# segments — `reserve_small_segment`'s `reserve_aligned_lazy` call, plus B3's
# decommit-aware reuse of a pooled/decommitted small segment
# (`decommit_empty_segment_impl`'s lazy-commit branch). This is the ORIGINAL
# full `alloc-lazy-commit` behaviour prior to R12-9, kept under its own name
# for callers who want it in isolation from the primordial policy. Stays
# opt-in, NOT part of `production`: R8-10 (task #223, commit 852828e) found
# empty→pool→reuse→refill cycles under this policy cost 50-75x more
# commit/decommit syscalls than the eager path before that task's admission-
# side fix landed; the fix (pool admission never resets a pooled segment) is
# permanent, but the underlying decommit/recommit correctness surface this
# policy exercises on every pool eviction is still a materially larger
# surface than `primordial-lazy-commit`'s one-time bootstrap reservation, so
# it is not promoted here. Feature-OFF: `reserve_small_segment` uses the
# plain eager `Segment::reserve`, byte-for-byte unchanged from pre-R12-9.
small-segment-lazy-commit = [
    "alloc-core",
    "aligned-vmem/alloc-lazy-commit",
    "aligned-vmem/fault-injection",
]
# R12-10 (task #261, P1, Stage 1+2 of the design docs below): Small-path
# `alloc_zeroed` virgin-carve zero-skip. Design-verified twice, both
# CONDITIONAL GO — `docs/perf/R9_5_VIRGIN_ZERO_SKIP_DESIGN.md` (primary) and
# `docs/perf/R11_8_SMALL_VIRGIN_ZERO_SKIP_DESIGN.md` (independent
# re-verification, same verdict). This feature realizes that design: a
# genuinely first-touch ("virgin") small-class carve is served by a fresh OS
# reservation (or a first-time incremental commit), which the OS already
# zero-fills (Windows `VirtualAlloc` MEM_COMMIT demand-zero / Unix zero-filled
# `mmap`) — so `alloc_zeroed`'s explicit `Node::zero` pass is REDUNDANT and is
# skipped for such a block. A reused (freed-then-realloc'd, or pooled) block
# is NEVER treated as virgin (the dispatch test: only a bump-cursor CARVE, not
# a free-list POP, can be virgin) and is always zeroed explicitly, exactly as
# before.
#
# Adds one owner-only `payload_virgin: bool` field to `SegmentHeader`
# (present in every build's layout, read/written only under this feature —
# same discipline as `committed_payload_end`/`decommitted`), a
# `SMALL_ZERO_PASS_CALLS` diagnostic counter mirroring the shipped
# `LARGE_ZERO_PASS_CALLS` (task #221/R9-1), and a virgin-aware
# `alloc_small_with_virgin` substrate entry point consumed by BOTH
# `AllocCore::alloc_zeroed`'s small arm and — the production win —
# `HeapCore::alloc_zeroed`'s small arm (which bypasses the per-thread
# magazine for this call only, mirroring how the Large arm already bypasses
# `self.alloc()` to reach `alloc_large`'s freshness tuple directly; the plain
# `alloc`/`GlobalAlloc::alloc` magazine fast path is UNTOUCHED by this
# feature).
#
# Withheld unconditionally under `cfg!(miri)` (miri's `std::alloc` fallback
# does not zero-fill fresh memory — the same gate `alloc_large_slow` already
# uses for the Large-path skip, task #221/R9-1's fix for the exact bug class
# this feature must not reintroduce).
#
# NOT part of `production` or any default-on bundle. `--all-features` pulls
# it in (as it does every other opt-in feature here). Promotion to
# `production` is a separate, explicit decision — see this task's own report
# for the GO/CONDITIONAL-GO/NO-GO recommendation. Requires `alloc-decommit`
# (the lifetime-reset rule that clears `payload_virgin` on an in-place
# decommit-retain lives in the shared `decommit_empty_segment_impl` body,
# which is itself `alloc-decommit`-gated).
virgin-zero-skip = ["alloc-decommit"]

[dependencies]
# Phase 1: typed handle store (Region<T> + Handle<T> + SyncRegion<T>), extracted
# from sefer-alloc into a standalone, independently-publishable crate alongside
# aligned-vmem / numa-shim / malloc-bench-rs. sefer-alloc re-exports its surface
# for backward compatibility — existing users of `use sefer_alloc::{Region,
# Handle, SyncRegion}` continue to work unchanged. New consumers who want ONLY
# the handle store (no allocator stack) should depend on `sefer-region` directly.
#
# `default-features = false`: sefer-region gates its std-dependent SyncRegion on
# its own `std` feature, which we re-enable via our own `std` feature so the
# no_std core compiles without it and the default build gets SyncRegion as before.
sefer-region = { path = "crates/region", version = "0.1", default-features = false }
# Phase 3b-I: atomic snapshot publication for lock-free reads. Optional — only
# the `experimental` concurrent tier pulls it in. Its internal `unsafe` is the
# dependency's, not ours; our crate stays `#![forbid(unsafe_code)]` with it on.
arc-swap = { version = "1", optional = true }
# Phase 3b-II: epoch-based memory reclamation for the per-slot-atomics lock-free
# read tier. Optional — only pulled in by `experimental`. Its `unsafe` is the
# dependency's; OUR `unsafe` is confined to src/concurrent/hand.rs (the single
# documented `#![allow(unsafe_code)]` module) and is wrapped in a safe-to-use
# `AtomicSlot<T>` API. See docs/PLAN.md.
crossbeam-epoch = { version = "0.9", optional = true }
# Phase 7c: OS thread-to-core pinning for the thread-per-core runner. A safe
# wrapper over `sched_setaffinity` (Linux) / `SetThreadAffinityMask` (Windows)
# / `thread_policy_set` (macOS). Optional — only the `pinning` feature pulls it
# in. Pinning is best-effort on some OSes; the runner still runs correctly if
# the host refuses the affinity. See docs/PLAN.md §7c.
core_affinity = { version = "0.8", optional = true }
# Phase 8 (alloc-core) OS aperture: SEGMENT-aligned anonymous virtual memory,
# page-level decommit/recommit. Extracted from sefer-alloc into a standalone
# crate so it can be used and published independently. Pulled in ONLY by the
# `alloc-core` feature (and every feature that depends on it).
aligned-vmem = { path = "crates/vmem", version = "0.2", optional = true }
# CRATE-P3: the lazy CAS-published pointer cell (UNINIT -> INITIALIZING -> READY
# with OOM rollback + loser re-race), extracted from `registry/bootstrap.rs`'s
# per-chunk / overflow-sidecar materialisation state machine and
# `global/fallback.rs`'s init state-word. Allocation-free and
# `#[global_allocator]`-safe (no std sync, no reentrancy) — the exact niche the
# registry bootstrap needs. Pulled in ONLY by `alloc-core` (and every feature
# that depends on it), since the state machine lives on the allocator bootstrap
# path. See `crates/racy-ptr-cell/src/lib.rs`.
racy-ptr-cell = { path = "crates/racy-ptr-cell", version = "0.1", optional = true }
# CRATE-P5: const-built size-class table + compile-time-derived O(1) size->class
# lookup + alignment-divisibility classifier, extracted from
# `src/alloc_core/size_classes.rs` (pure safe const arithmetic — no unsafe, no
# memory). `src/alloc_core/size_classes.rs` is now a thin compat shim that wires
# sefer's one concrete instantiation of the crate's const-generic builder and
# re-exports the exact `super::size_classes::*` surface every in-tree call site
# already uses. Pulled in ONLY by `alloc-core`. See `crates/size-classes`.
size-classes = { path = "crates/size-classes", version = "0.1", optional = true }
# CRATE-P7: the ABA-tagged Treiber free-index stack (a slot recycler), extracted
# from `registry/tagged_ptr.rs` (the packed `index:16 | tag:48` word) +
# `heap_registry.rs`'s `pop_free_slot`/`push_free_slot` Treiber loop. The
# registry's `free_slots` is now a `TaggedIndexStack<16>` and its slot-resident
# `next_free` links reach the crate through a `Links` adapter; the H-2
# empty-transition tag preservation and the RAD-1 lazy-link discipline live in
# the crate. Pulled in ONLY by `alloc-global` (and every feature that depends on
# it), since the registry is `alloc-global`-gated. See `crates/tagged-index-stack`.
tagged-index-stack = { path = "crates/tagged-index-stack", version = "0.1", optional = true }
# Phase 78 (numa-aware) NUMA seam: dependency-free NUMA detection + binding,
# extracted from sefer-alloc into a standalone crate so it can be published
# independently. Pulled in ONLY by the `numa-aware` feature.
numa-shim = { path = "crates/numa", version = "0.1", features = ["vmem-integration"], optional = true }

[dev-dependencies]
# Phase 2 dependency: the locality bench compares `Region` against raw
# `slotmap::SlotMap` / `DenseSlotMap`. slotmap is no longer a direct production
# dep (it lives in `sefer-region`), but the bench still needs it for the head-
# to-head numbers. Dev-only.
slotmap = "1"
# Phase 0 dependency: property-based differential testing against a reference
# model. This is the heart of the verification-first build — see docs/PLAN.md.
proptest = "1"
# Task #52: tokio burn-in example — async runtime driving SeferAlloc as
# #[global_allocator].  Minimal feature set: rt-multi-thread (multi-thread
# scheduler), macros (#[tokio::main]), sync (mpsc channel), time (sleep /
# timeout / interval).  No fs/net/signal/process — not needed for the harness.
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
# Phase 2: criterion benches that empirically choose the single-threaded
# backing container (SlotMap vs DenseSlotMap vs HashMap vs Vec<Box<T>>) across
# the iterate / lookup / churn axes. See docs/BENCHMARKS.md for the verdict.
criterion = "0.5"
# Phase 9: mimalloc for head-to-head benchmarking of the per-thread heap's
# alloc/dealloc hot path vs a state-of-the-art allocator. Dev-only — NOT a
# runtime dependency.
mimalloc = "0.1"
# CRATE-P1: the extracted larson/mstress macro-benchmark harness. Dev-only —
# `examples/malloc_macro.rs` drives it (through its `run_with` per-thread pin
# hook) instead of carrying a second copy of the workload. NOT a runtime dep.
malloc-bench-rs = { path = "crates/malloc-bench" }
# CRATE-P6: the extracted differential op-stream harness (reference model +
# M1-M4 oracles). Dev-only — `tests/alloc_core_differential.rs` and
# `tests/heap_differential.rs` are thin consumers of its `proptest` front-end
# (the third consumer, `fuzz/fuzz_targets/global_alloc_ops.rs`, uses the
# `arbitrary` front-end from its own workspace). The M1-M4 oracle logic lives
# ONLY in the crate now, so an oracle improvement reaches all three at once.
# NOT a runtime dep.
globalalloc-model = { path = "crates/globalalloc-model", features = ["proptest"] }
# CRATE-P8: the extracted same-instant RSS + commit-charge + peak-RSS process
# self-probe. Dev-only — the three process-probe examples
# (`first_alloc_process`, `dealloc_only_unbound_thread`, the `paired_ab_*`
# trio) fold their previously-triplicated `K32GetProcessMemoryInfo` /
# `/proc/self/statm` FFI onto this crate's `snapshot()`. The FFI now lives in
# ONE place. NOT a runtime dep.
proc-memstat = { path = "crates/proc-memstat" }
# CRATE-P9: the extracted `RESULT key=value` stdout protocol
# (`proc_probe::emit`/`emit_u64`/`emit_ns`/… + a re-export of proc-memstat's
# `snapshot`/`MemStat`). Dev-only — the process-probe examples
# (`first_alloc_process`, `dealloc_only_unbound_thread`, the `paired_ab_*`
# trio) emit their `RESULT` lines through it and read memory via its re-export,
# so a probe binary has ONE "measure + report" dependency and the emit format
# can never drift from what `scripts/*.mjs` parse. NOT a runtime dep.
proc-probe = { path = "crates/proc-probe" }

# Phase 3b-II: loom model-checks the publication PROTOCOL (generation/value
# ordering) of the epoch tier. loom and crossbeam-epoch do NOT compose (loom
# replaces the allocator and atomics), so the loom harness models a bare
# AtomicU32 generation + AtomicPtr value publication using loom's own atomics,
# NOT crossbeam. Reclamation correctness rests on the crate + miri, not loom.
# Built only under `cfg(loom)` (`RUSTFLAGS="--cfg loom"` / `--cfg loom`).
[target.'cfg(loom)'.dev-dependencies]
loom = "0.7"

